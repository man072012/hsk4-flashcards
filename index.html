<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>بطاقات HSK4 التعليمية</title>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Amiri:wght@400;700&family=LXGW+WenKai+TC:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a1a1a;--ink2:#2c2318;--ink3:#5c4a3a;--ink4:#8a7560;
  --paper:#f5efe0;--paper2:#e8dcc8;--paper3:#faf6ed;
  --red:#c23a2b;--red2:#d4574a;--gold:#b8943e;--gold2:#d4b86a;
  --jade:#4a7c6f;--jade2:#6a9e8e;--blue:#3a6fa0;
  --verb:var(--red);--noun:var(--blue);--adj:var(--jade);
  --correct:var(--jade);--wrong:var(--red);--shadow:rgba(44,35,24,0.1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;overflow:hidden}
body{
  font-family:'Amiri','Reem Kufi',serif;
  background:var(--paper);color:var(--ink2);
  height:100%;display:flex;flex-direction:column;overflow:hidden;
  background-image:
    radial-gradient(circle at 20% 80%,rgba(194,58,43,0.03) 0%,transparent 50%),
    radial-gradient(circle at 80% 20%,rgba(184,148,62,0.04) 0%,transparent 50%);
}
/* === TOP BAR === */
.topbar{
  padding:12px 16px 0;display:flex;align-items:center;gap:10px;
  flex-shrink:0;position:relative;z-index:20;
}
.topbar::after{
  content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,var(--ink4),transparent);opacity:0.3;
}
.logo{
  font-family:'Reem Kufi',serif;font-size:1rem;font-weight:700;color:var(--ink);
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.logo .seal{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border:1.5px solid var(--red);border-radius:3px;
  font-family:'LXGW WenKai TC',sans-serif;font-size:11px;color:var(--red);
  transform:rotate(-2deg);line-height:1;font-weight:700;
}
.topbar-stats{
  display:flex;gap:12px;margin-right:auto;margin-left:0;font-size:0.7rem;color:var(--ink4);
}
.topbar-stats span{font-weight:700;}
.topbar-stats .s-known{color:var(--jade);}
.topbar-stats .s-unknown{color:var(--red);}
.mode-toggle{
  display:flex;background:var(--paper2);border-radius:20px;padding:2px;
  border:1px solid rgba(0,0,0,0.05);
}
.mode-toggle button{
  padding:6px 14px;border:none;border-radius:18px;background:transparent;
  font-family:'Reem Kufi',serif;font-size:0.7rem;font-weight:600;
  color:var(--ink4);cursor:pointer;transition:all 0.3s;
}
.mode-toggle button.active{background:var(--red);color:#fff;box-shadow:0 2px 8px rgba(194,58,43,0.25);}

/* === FILTERS STRIP === */
.filters-strip{
  display:flex;gap:6px;padding:10px 16px 6px;overflow-x:auto;flex-shrink:0;
  scrollbar-width:none;-ms-overflow-style:none;
}
.filters-strip::-webkit-scrollbar{display:none}
.fbtn{
  padding:5px 14px;border-radius:20px;border:1px solid rgba(0,0,0,0.08);
  background:var(--paper3);font-family:'Reem Kufi',serif;font-size:0.68rem;
  font-weight:600;color:var(--ink4);cursor:pointer;white-space:nowrap;
  transition:all 0.25s;flex-shrink:0;
}
.fbtn:hover{border-color:var(--gold);}
.fbtn.active{background:var(--gold);color:#fff;border-color:var(--gold);box-shadow:0 2px 8px rgba(184,148,62,0.2);}
.fbtn[data-cat="verb"].active{background:var(--red);border-color:var(--red);box-shadow:0 2px 8px rgba(194,58,43,0.2);}
.fbtn[data-cat="noun"].active{background:var(--blue);border-color:var(--blue);box-shadow:0 2px 8px rgba(58,111,160,0.2);}
.fbtn[data-cat="adj"].active{background:var(--jade);border-color:var(--jade);box-shadow:0 2px 8px rgba(74,124,111,0.2);}

.topics-strip{display:flex;gap:4px;padding:0 16px 8px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.topics-strip::-webkit-scrollbar{display:none}
.tbtn{
  padding:3px 10px;border-radius:12px;border:1px solid rgba(0,0,0,0.06);
  background:transparent;font-family:'Amiri',serif;font-size:0.62rem;
  color:var(--ink4);cursor:pointer;white-space:nowrap;transition:all 0.25s;flex-shrink:0;
}
.tbtn.active{background:rgba(184,148,62,0.1);border-color:var(--gold);color:var(--gold);}

/* === PROGRESS === */
.progress-strip{padding:0 16px 6px;flex-shrink:0;display:flex;align-items:center;gap:8px;}
.progress-track{flex:1;height:2px;background:var(--paper2);border-radius:2px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:2px;transition:width 0.4s ease;width:0%;}
.progress-label{font-size:0.6rem;color:var(--ink4);font-family:'Reem Kufi',serif;white-space:nowrap;min-width:36px;text-align:center;}

/* === CARD HERO AREA === */
.card-hero{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:4px 8px;position:relative;z-index:10;
  min-height:0;overflow:hidden;
}
.card-container{perspective:1400px;width:100%;max-width:380px;padding:0 12px;}
.card{
  position:relative;width:100%;transform-style:preserve-3d;
  transition:transform 0.7s cubic-bezier(0.4,0.2,0.2,1);cursor:pointer;
}
.card.flipped{transform:rotateY(180deg);}

.card-face{
  backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;
  box-shadow:0 8px 40px var(--shadow),0 2px 8px rgba(0,0,0,0.04);
  position:relative;overflow:hidden;
  background:var(--paper3);
  border:1px solid rgba(0,0,0,0.04);
}
/* Side accent line */
.card-face::before{
  content:'';position:absolute;top:12px;bottom:12px;right:0;width:3px;
  background:linear-gradient(180deg,var(--red),var(--gold));border-radius:3px;
}
/* Corner ornament */
.card-face::after{
  content:'';position:absolute;top:8px;left:8px;width:24px;height:24px;
  border-top:1.5px solid var(--ink4);border-left:1.5px solid var(--ink4);opacity:0.12;
}
.card-front{
  position:relative;padding:32px 24px 20px;
  justify-content:center;align-items:center;text-align:center;
  min-height:280px;
}
.card-back{
  position:absolute;top:0;left:0;width:100%;min-height:100%;
  padding:24px 20px;transform:rotateY(180deg);direction:rtl;
}

/* Badges */
.badge-cat{
  position:absolute;top:12px;right:12px;padding:3px 10px;border-radius:3px;
  font-family:'Reem Kufi',serif;font-size:0.58rem;font-weight:700;color:#fff;
  letter-spacing:0.5px;
}
.badge-cat.verb{background:var(--red)}.badge-cat.noun{background:var(--blue)}.badge-cat.adj{background:var(--jade)}
.badge-topic{
  position:absolute;top:12px;left:12px;padding:2px 8px;border-radius:3px;
  font-size:0.55rem;color:var(--ink4);background:rgba(0,0,0,0.03);
  border:1px solid rgba(0,0,0,0.04);font-family:'Amiri',serif;
}

/* Card content */
.hz{
  font-family:'LXGW WenKai TC','Noto Sans SC',sans-serif;
  font-size:clamp(3rem,10vw,4.5rem);font-weight:700;color:var(--ink);
  line-height:1.15;margin:8px 0 6px;
  text-shadow:0 2px 20px rgba(44,35,24,0.06);
  transition:transform 0.3s;
}
.card:hover .hz{transform:scale(1.03);}
.py{font-size:1rem;color:var(--gold);font-style:italic;margin-bottom:4px;font-family:'Amiri',serif;}
.ar{font-size:0.95rem;color:var(--ink2);font-weight:600;font-family:'Amiri',serif;}

/* TTS */
.tts-row{display:flex;gap:6px;margin-top:8px;direction:ltr;justify-content:center;flex-wrap:wrap;}
.tts-btn{
  background:var(--red);border:none;border-radius:20px;padding:6px 14px;
  color:#fff;font-family:'Reem Kufi',serif;font-size:0.68rem;font-weight:600;
  cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:4px;
}
.tts-btn:hover{transform:scale(1.06);box-shadow:0 3px 12px rgba(194,58,43,0.25);}
.tts-btn:active{transform:scale(0.95);}
.tts-btn svg{width:13px;height:13px;}

/* Practice input */
.practice-wrap{margin-top:8px;width:100%;max-width:180px;text-align:center;}
.practice-label{font-size:0.55rem;color:var(--ink4);margin-bottom:3px;font-family:'Amiri',serif;}
.practice-row{display:flex;gap:4px;direction:ltr;align-items:center;justify-content:center;}
.practice-input{
  width:100%;padding:5px 8px;border-radius:8px;border:1.5px solid rgba(0,0,0,0.08);
  background:#fff;color:var(--ink);font-family:'LXGW WenKai TC','Noto Sans SC',sans-serif;
  font-size:1.2rem;text-align:center;outline:none;transition:all 0.3s;
}
.practice-input:focus{border-color:var(--gold);box-shadow:0 0 12px rgba(184,148,62,0.15);}
.practice-icon{font-size:1rem;min-width:18px;}

.card-counter{font-size:0.6rem;color:var(--ink4);margin-top:8px;font-family:'Reem Kufi',serif;}

/* Back face */
.back-label{font-family:'Reem Kufi',serif;font-size:0.6rem;color:var(--red);font-weight:700;letter-spacing:0.5px;margin-bottom:4px;}
.back-hz{font-family:'LXGW WenKai TC','Noto Sans SC',sans-serif;font-size:1.4rem;font-weight:700;color:var(--ink);direction:ltr;text-align:left;margin-bottom:2px;}
.back-py{font-size:0.8rem;color:var(--gold);font-style:italic;direction:ltr;text-align:left;margin-bottom:4px;}
.back-ar{font-size:0.85rem;color:var(--ink2);line-height:1.5;margin-bottom:12px;}
.sent-box{
  background:rgba(0,0,0,0.015);border:1px solid rgba(0,0,0,0.04);border-radius:10px;
  padding:12px;border-right:2.5px solid var(--gold2);
}
.sent-zh{font-family:'LXGW WenKai TC','Noto Sans SC',sans-serif;font-size:1rem;font-weight:500;color:var(--ink);direction:ltr;text-align:left;line-height:1.6;margin-bottom:3px;}
.sent-py{font-size:0.7rem;color:var(--gold);font-style:italic;direction:ltr;text-align:left;margin-bottom:4px;opacity:0.8;}
.sent-ar{font-size:0.78rem;color:var(--ink3);line-height:1.5;}

/* === BOTTOM NAV === */
.bottom-nav{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  gap:8px;padding:10px 16px 14px;
  background:linear-gradient(0deg,var(--paper2) 0%,var(--paper) 100%);
  border-top:1px solid rgba(0,0,0,0.04);
  position:relative;z-index:20;
}
.bn-action{
  padding:10px 18px;border-radius:12px;border:none;
  font-family:'Reem Kufi',serif;font-size:0.75rem;font-weight:700;
  cursor:pointer;transition:all 0.2s;color:#fff;flex:1;max-width:120px;
}
.bn-know{background:var(--jade);}
.bn-dont{background:var(--red);}
.bn-action:active{transform:scale(0.94);}
.bn-arrow{
  width:42px;height:42px;border-radius:50%;background:var(--paper3);
  border:1px solid rgba(0,0,0,0.06);color:var(--ink2);font-size:1.1rem;
  cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px var(--shadow);flex-shrink:0;
}
.bn-arrow:active{transform:scale(0.9);}
.bn-shuffle{
  position:absolute;top:-22px;left:50%;transform:translateX(-50%);
  padding:3px 12px;border-radius:10px;background:var(--paper3);
  border:1px solid rgba(0,0,0,0.06);font-family:'Reem Kufi',serif;
  font-size:0.6rem;color:var(--ink4);cursor:pointer;white-space:nowrap;
  box-shadow:0 1px 4px var(--shadow);transition:all 0.2s;
}
.bn-shuffle:hover{border-color:var(--gold);color:var(--gold);}

/* === ANIMATIONS === */
.card-enter{animation:heroIn 0.5s cubic-bezier(0.22,1,0.36,1);}
@keyframes heroIn{
  from{opacity:0;transform:translateY(24px) scale(0.94) rotateX(4deg);}
  to{opacity:1;transform:translateY(0) scale(1) rotateX(0);}
}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shake{animation:shake 0.4s ease;}
@keyframes feedbackIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* === QUIZ === */
.quiz-card{
  width:100%;max-width:380px;background:var(--paper3);border-radius:16px;
  border:1px solid rgba(0,0,0,0.04);padding:28px 20px;text-align:center;
  box-shadow:0 8px 40px var(--shadow);position:relative;overflow:hidden;
}
.quiz-card::before{content:'';position:absolute;top:12px;bottom:12px;right:0;width:3px;background:linear-gradient(180deg,var(--red),var(--gold));border-radius:3px;}
.quiz-card.card-enter{animation:heroIn 0.5s cubic-bezier(0.22,1,0.36,1);}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.quiz-score-badge{padding:4px 10px;border-radius:12px;font-size:0.65rem;font-weight:700;background:rgba(0,0,0,0.03);color:var(--ink3);direction:ltr;font-family:'Reem Kufi',serif;}
.quiz-score-badge .correct-num{color:var(--jade)}.quiz-score-badge .wrong-num{color:var(--red)}
.quiz-chinese{font-family:'LXGW WenKai TC','Noto Sans SC',sans-serif;font-size:clamp(3rem,12vw,5rem);font-weight:700;color:var(--ink);margin:12px 0;line-height:1.15;}
.quiz-arabic-hint{font-size:0.85rem;color:var(--ink3);margin-bottom:16px;font-family:'Amiri',serif;}
.quiz-input-wrap{position:relative;margin:0 auto 12px;max-width:280px;direction:ltr;}
.quiz-input{
  width:100%;padding:12px 16px;border-radius:12px;border:2px solid rgba(0,0,0,0.08);
  background:#fff;color:var(--ink);font-family:inherit;font-size:1.1rem;
  text-align:center;outline:none;transition:all 0.3s;
}
.quiz-input::placeholder{color:var(--ink4);font-size:0.8rem}
.quiz-input:focus{border-color:var(--gold);box-shadow:0 0 16px rgba(184,148,62,0.15);}
.quiz-input.correct{border-color:var(--jade);box-shadow:0 0 12px rgba(74,124,111,0.2);background:rgba(74,124,111,0.04);}
.quiz-input.wrong{border-color:var(--red);box-shadow:0 0 12px rgba(194,58,43,0.15);background:rgba(194,58,43,0.03);}
.quiz-submit-btn{padding:10px 36px;border-radius:12px;border:none;background:var(--red);color:#fff;font-family:'Reem Kufi',serif;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-bottom:6px;}
.quiz-submit-btn:hover{box-shadow:0 4px 16px rgba(194,58,43,0.25);}
.quiz-submit-btn:disabled{opacity:0.4;cursor:not-allowed}
.quiz-skip-btn{display:block;margin:4px auto 0;padding:6px 16px;border-radius:8px;border:1px solid rgba(0,0,0,0.08);background:transparent;color:var(--ink4);font-family:'Amiri',serif;font-size:0.7rem;cursor:pointer;}
.quiz-feedback{margin-top:12px;padding:14px;border-radius:12px;animation:feedbackIn 0.3s ease;}
.quiz-feedback.correct-fb{background:rgba(74,124,111,0.06);border:1px solid rgba(74,124,111,0.15);border-right:3px solid var(--jade);}
.quiz-feedback.wrong-fb{background:rgba(194,58,43,0.04);border:1px solid rgba(194,58,43,0.1);border-right:3px solid var(--red);}
.quiz-fb-icon{font-size:1.8rem;margin-bottom:6px}.quiz-fb-text{font-size:0.8rem;font-weight:600;margin-bottom:3px;}
.quiz-fb-answer{font-size:1rem;font-weight:700;direction:ltr;margin-top:3px;}.quiz-fb-answer .correct-answer{color:var(--jade);}
.quiz-next-btn{margin-top:10px;padding:8px 24px;border-radius:10px;border:1px solid rgba(0,0,0,0.06);background:var(--paper2);color:var(--ink2);font-family:'Reem Kufi',serif;font-size:0.8rem;font-weight:700;cursor:pointer;}
.quiz-summary{width:100%;max-width:380px;text-align:center;padding:32px 20px;animation:feedbackIn 0.4s ease;}
.quiz-summary-title{font-family:'Reem Kufi',serif;font-size:1.3rem;font-weight:700;color:var(--ink);margin-bottom:6px;}
.quiz-summary-emoji{font-size:3.5rem;margin:12px 0}.quiz-score-display{font-size:3rem;font-weight:900;margin:8px 0 2px;font-family:sans-serif;}
.quiz-score-label{font-size:0.8rem;color:var(--ink3);margin-bottom:16px;font-family:'Amiri',serif;}
.quiz-summary-details{display:flex;justify-content:center;gap:20px;margin-bottom:20px;}
.quiz-detail{text-align:center}.quiz-detail-num{font-size:1.6rem;font-weight:800;font-family:sans-serif}.quiz-detail-label{font-size:0.65rem;color:var(--ink4);}
.quiz-mistakes-list{text-align:right;margin-top:16px;background:var(--paper3);border-radius:12px;padding:14px;border:1px solid rgba(0,0,0,0.04);max-height:200px;overflow-y:auto;}
.quiz-mistakes-title{font-size:0.7rem;color:var(--red);font-weight:700;margin-bottom:8px;text-align:center;font-family:'Reem Kufi',serif;}
.quiz-mistake-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.03);direction:ltr;}
.quiz-mistake-item:last-child{border-bottom:none}
.mistake-zh{font-family:'LXGW WenKai TC','Noto Sans SC',sans-serif;font-size:1rem;font-weight:700;color:var(--ink);}
.mistake-correct{font-size:0.8rem;color:var(--jade);font-weight:600}.mistake-yours{font-size:0.75rem;color:var(--red);text-decoration:line-through;opacity:0.7}
.quiz-restart-btn{margin-top:16px;padding:12px 36px;border-radius:12px;border:none;background:var(--red);color:#fff;font-family:'Reem Kufi',serif;font-size:0.9rem;font-weight:700;cursor:pointer;}

/* === WORD LIST === */
.word-list{
  flex:1;overflow-y:auto;padding:0 12px 12px;min-height:0;
  scrollbar-width:thin;scrollbar-color:var(--paper2) transparent;
}
.word-list::-webkit-scrollbar{width:3px}
.word-list::-webkit-scrollbar-thumb{background:var(--paper2);border-radius:3px}
.wl-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:10px;margin-bottom:4px;cursor:pointer;
  transition:all 0.2s;background:var(--paper3);border:1px solid rgba(0,0,0,0.03);
  animation:listIn 0.3s ease both;
}
.wl-item:hover{background:var(--paper2);transform:translateX(-2px);box-shadow:0 2px 8px var(--shadow);}
.wl-item:active{transform:scale(0.98);}
@keyframes listIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.wl-hz{
  font-family:'LXGW WenKai TC','Noto Sans SC',sans-serif;
  font-size:1.6rem;font-weight:700;color:var(--ink);min-width:50px;text-align:center;
  line-height:1.2;
}
.wl-info{flex:1;min-width:0;}
.wl-py{font-size:0.72rem;color:var(--gold);font-style:italic;font-family:'Amiri',serif;}
.wl-ar{font-size:0.78rem;color:var(--ink2);font-family:'Amiri',serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wl-badges{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.wl-cat{
  padding:2px 8px;border-radius:3px;font-family:'Reem Kufi',serif;
  font-size:0.5rem;font-weight:700;color:#fff;
}
.wl-cat.verb{background:var(--red)}.wl-cat.noun{background:var(--blue)}.wl-cat.adj{background:var(--jade)}
.wl-status{font-size:0.7rem;}
.wl-status.known{color:var(--jade)}.wl-status.unknown{color:var(--red)}
.wl-search{
  display:flex;gap:6px;padding:0 12px 8px;flex-shrink:0;
}
.wl-search-input{
  flex:1;padding:7px 12px;border-radius:20px;border:1px solid rgba(0,0,0,0.06);
  background:var(--paper3);font-family:'Amiri','LXGW WenKai TC',serif;font-size:0.8rem;
  color:var(--ink);outline:none;transition:border-color 0.2s;
}
.wl-search-input:focus{border-color:var(--gold);}
.wl-search-input::placeholder{color:var(--ink4);}
.wl-count{
  font-family:'Reem Kufi',serif;font-size:0.6rem;color:var(--ink4);
  padding:0 12px 6px;
}

.empty-state{text-align:center;padding:40px 20px;color:var(--ink4)}.empty-state .emoji{font-size:2.5rem;margin-bottom:10px}
.hidden{display:none !important}
@media(max-width:380px){.hz,.quiz-chinese{font-size:2.8rem!important}.card-front{padding:24px 16px 16px;min-height:240px}.bn-action{padding:8px 12px;font-size:0.7rem}}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">

// Audio
function getWordIndex(text){for(let i=0;i<words.length;i++){if(words[i].zh===text)return{type:'w',idx:i};if(words[i].sentence.zh===text)return{type:'s',idx:i};}return null;}
function speak(text,lang='zh-CN'){const match=getWordIndex(text);if(match){const src='audio/'+match.type+'_'+match.idx+'.mp3';const a=new Audio(src);a.onerror=()=>speakFB(text,lang);a.play().catch(()=>speakFB(text,lang));return;}speakFB(text,lang);}
function speakFB(text,lang){if('speechSynthesis' in window){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=lang;u.rate=0.85;u.pitch=1;const v=window.speechSynthesis.getVoices();const p=v.find(x=>x.lang.startsWith('zh')&&(x.name.includes('Microsoft')||x.name.includes('Xiaoxiao')||x.name.includes('Google')))||v.find(x=>x.lang.startsWith('zh'));if(p)u.voice=p;window.speechSynthesis.speak(u);}}
if('speechSynthesis' in window){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();}

function setMode(mode){currentMode=mode;
document.getElementById('modeCards').classList.toggle('active',mode==='cards');
document.getElementById('modeList').classList.toggle('active',mode==='list');
document.getElementById('modeQuiz').classList.toggle('active',mode==='quiz');
document.getElementById('statsBar').classList.toggle('hidden',mode==='quiz');
document.getElementById('quizStatsBar').classList.toggle('hidden',mode!=='quiz');
document.getElementById('navArea').classList.toggle('hidden',mode!=='cards');
document.getElementById('progressStrip').classList.toggle('hidden',mode==='list');
if(mode==='quiz'){startQuiz();}else if(mode==='list'){renderList();}else{renderCard();updateProgress();}}

function getTopics(){const t=new Set();words.forEach(w=>t.add(w.topic));return[...t];}
function buildTopicFilters(){const c=document.getElementById('topicFilters');const topics=getTopics();let h='<button class="tbtn active" data-topic="all" onclick="setTopic(\'all\')">الكل</button>';topics.forEach(t=>{h+='<button class="tbtn" data-topic="'+t+'" onclick="setTopic(\''+t+'\')">'+t+'</button>';});c.innerHTML=h;}
function setTopic(topic){currentTopic=topic;document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));document.querySelector('.tbtn[data-topic="'+topic+'"]').classList.add('active');applyFilters();}
function applyFilters(){filteredWords=words.filter(w=>{const c=currentFilter==='all'||w.cat===currentFilter;const t=currentTopic==='all'||w.topic===currentTopic;return c&&t;});currentIndex=0;isFlipped=false;updateCounts();if(currentMode==='cards'){renderCard();updateProgress();}else if(currentMode==='list'){renderList();}else{startQuiz();}}
function setFilter(cat){currentFilter=cat;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));document.querySelector('.fbtn[data-cat="'+cat+'"]').classList.add('active');applyFilters();}
function updateCounts(){document.getElementById('countAll').textContent='('+words.length+')';document.getElementById('countVerb').textContent='('+words.filter(w=>w.cat==='verb').length+')';document.getElementById('countNoun').textContent='('+words.filter(w=>w.cat==='noun').length+')';document.getElementById('countAdj').textContent='('+words.filter(w=>w.cat==='adj').length+')';document.getElementById('totalCount').textContent=filteredWords.length;document.getElementById('knownCount').textContent=known.size;document.getElementById('unknownCount').textContent=unknown.size;}
function updateQuizStats(){document.getElementById('quizTotal').textContent=quizWords.length;document.getElementById('quizCorrectStat').textContent=quizCorrect;document.getElementById('quizWrongStat').textContent=quizWrong;}
function getCatLabel(c){return{verb:'فعل',noun:'اسم',adj:'صفة'}[c]||c;}
function updateProgress(){if(!filteredWords.length)return;const pct=((currentIndex+1)/filteredWords.length*100);document.getElementById('progressFill').style.width=pct+'%';document.getElementById('progressText').textContent=(currentIndex+1)+' / '+filteredWords.length;}

const SVG_SPEAKER='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>';

function renderCard(){
const a=document.getElementById('cardArea');
if(!filteredWords.length){a.innerHTML='<div class="empty-state"><div class="emoji">📭</div><p>لا توجد بطاقات لهذا التصنيف</p></div>';return;}
const w=filteredWords[currentIndex];
a.innerHTML=`<div class="card-container"><div class="card card-enter" id="theCard" onclick="flipCard()">
<div class="card-face card-front">
  <span class="badge-cat ${w.cat}">${getCatLabel(w.cat)}</span>
  <span class="badge-topic">${w.topic}</span>
  <div class="hz">${w.zh}</div>
  <div class="py">${w.py}</div>
  <div class="ar">${w.ar}</div>
  <div class="tts-row" onclick="event.stopPropagation()">
    <button class="tts-btn" onclick="speak('${w.zh}')">${SVG_SPEAKER} الكلمة</button>
  </div>
  <div class="practice-wrap" onclick="event.stopPropagation()">
    <div class="practice-label">جرّب كتابة الحرف:</div>
    <div class="practice-row">
      <input type="text" class="practice-input" id="pi_${currentIndex}" placeholder="汉字" autocomplete="off" dir="ltr" oninput="checkPractice(this,'${w.zh}')"/>
      <span class="practice-icon" id="pico_${currentIndex}"></span>
    </div>
  </div>
  <div class="card-counter">${currentIndex+1} / ${filteredWords.length}</div>
</div>
<div class="card-face card-back">
  <div style="margin-bottom:14px">
    <div class="back-label">الكلمة</div>
    <div class="back-hz">${w.zh}</div>
    <div class="back-py">${w.py}</div>
    <div class="back-ar">${w.ar} — <span style="color:var(--${w.cat==='verb'?'verb':w.cat==='noun'?'noun':'adj'})">${getCatLabel(w.cat)}</span></div>
  </div>
  <div>
    <div class="back-label">جملة تطبيقية</div>
    <div class="sent-box">
      <div class="sent-zh">${w.sentence.zh}</div>
      <div class="sent-py">${w.sentence.py}</div>
      <div class="sent-ar">${w.sentence.ar}</div>
    </div>
    <div class="tts-row" onclick="event.stopPropagation()">
      <button class="tts-btn" onclick="speak('${w.zh}')">${SVG_SPEAKER} الكلمة</button>
      <button class="tts-btn" onclick="speak('${w.sentence.zh.replace(/'/g,"\\'")}')">${SVG_SPEAKER} الجملة</button>
    </div>
  </div>
</div>
</div></div>`;
}

function flipCard(){const c=document.getElementById('theCard');if(c){isFlipped=!isFlipped;c.classList.toggle('flipped',isFlipped);}}

let listSearch='';
function renderList(){
const a=document.getElementById('cardArea');
let list=filteredWords;
if(listSearch){const q=listSearch.toLowerCase();list=list.filter(w=>w.zh.includes(q)||w.py.toLowerCase().includes(q)||w.ar.includes(q));}
let html=`<div style="display:flex;flex-direction:column;width:100%;max-width:460px;height:100%;min-height:0">
<div class="wl-search">
  <input type="text" class="wl-search-input" id="listSearchInput" placeholder="ابحث... 搜索 / pinyin / عربي" value="${listSearch}" oninput="listSearch=this.value;renderListItems();" dir="auto"/>
</div>
<div class="wl-count"><span id="listCount">${list.length}</span> كلمة</div>
<div class="word-list" id="wordListBody"></div>
</div>`;
a.innerHTML=html;
renderListItems();
}
function renderListItems(){
const body=document.getElementById('wordListBody');if(!body)return;
let list=filteredWords;
if(listSearch){const q=listSearch.toLowerCase();list=list.filter(w=>w.zh.includes(q)||w.py.toLowerCase().includes(q)||w.ar.includes(q));}
const countEl=document.getElementById('listCount');if(countEl)countEl.textContent=list.length;
if(!list.length){body.innerHTML='<div class="empty-state"><div class="emoji">🔍</div><p>لا توجد نتائج</p></div>';return;}
let html='';
list.forEach((w,i)=>{
  const realIdx=filteredWords.indexOf(w);
  const st=known.has(w.zh)?'<span class="wl-status known">✓</span>':unknown.has(w.zh)?'<span class="wl-status unknown">✗</span>':'';
  html+=`<div class="wl-item" style="animation-delay:${Math.min(i*0.02,0.5)}s" onclick="openFromList(${realIdx})">
    <div class="wl-hz">${w.zh}</div>
    <div class="wl-info"><div class="wl-py">${w.py}</div><div class="wl-ar">${w.ar}</div></div>
    <div class="wl-badges"><span class="wl-cat ${w.cat}">${getCatLabel(w.cat)}</span>${st}</div>
  </div>`;
});
body.innerHTML=html;
}
function openFromList(idx){currentIndex=idx;isFlipped=false;setMode('cards');}
function checkPractice(inp,correct){const v=inp.value.trim();const icon=inp.parentElement.querySelector('span');if(!v){inp.style.borderColor='rgba(0,0,0,0.08)';inp.style.boxShadow='none';inp.style.background='#fff';icon.textContent='';return;}if(v===correct.trim()){inp.style.borderColor='var(--jade)';inp.style.boxShadow='0 0 10px rgba(74,124,111,0.2)';inp.style.background='rgba(74,124,111,0.05)';icon.textContent='✓';icon.style.color='var(--jade)';}else{inp.style.borderColor='var(--red)';inp.style.boxShadow='0 0 10px rgba(194,58,43,0.12)';inp.style.background='rgba(194,58,43,0.03)';icon.textContent='✗';icon.style.color='var(--red)';}}
function goNext(){if(!filteredWords.length)return;currentIndex=(currentIndex+1)%filteredWords.length;isFlipped=false;renderCard();updateProgress();}
function goPrev(){if(!filteredWords.length)return;currentIndex=(currentIndex-1+filteredWords.length)%filteredWords.length;isFlipped=false;renderCard();updateProgress();}
function markKnown(){if(!filteredWords.length)return;known.add(filteredWords[currentIndex].zh);unknown.delete(filteredWords[currentIndex].zh);saveState();updateCounts();goNext();}
function markUnknown(){if(!filteredWords.length)return;unknown.add(filteredWords[currentIndex].zh);known.delete(filteredWords[currentIndex].zh);saveState();updateCounts();goNext();}
function shuffleCards(){filteredWords.sort(()=>Math.random()-0.5);currentIndex=0;isFlipped=false;renderCard();updateProgress();}

function startQuiz(){quizWords=filteredWords.filter(w=>known.has(w.zh));quizWords.sort(()=>Math.random()-0.5);quizIndex=0;quizCorrect=0;quizWrong=0;quizMistakes=[];updateQuizStats();renderQuizCard();}
function selectCat(c){selectedCat=c;document.querySelectorAll('.cat-choice-btn').forEach(b=>{b.style.borderColor=b.dataset.c===c?'var(--gold)':'rgba(0,0,0,0.08)';b.style.background=b.dataset.c===c?'rgba(184,148,62,0.1)':'transparent';});}

function renderQuizCard(){const a=document.getElementById('cardArea');if(!quizWords.length){a.innerHTML='<div class="empty-state"><div class="emoji">📝</div><p>لا توجد كلمات محددة بـ "أعرفها" بعد!<br>ارجع لوضع البطاقات واضغط "✓ أعرف".</p></div>';return;}
if(quizIndex>=quizWords.length){renderQuizSummary();return;}
const w=quizWords[quizIndex];quizAnswered=false;selectedCat=null;
const pct=((quizIndex+1)/quizWords.length*100);
document.getElementById('progressFill').style.width=pct+'%';
document.getElementById('progressText').textContent=(quizIndex+1)+' / '+quizWords.length;
a.innerHTML=`<div class="quiz-card card-enter">
<div class="quiz-header"><span class="quiz-score-badge"><span class="correct-num">${quizCorrect}</span> ✓ | <span class="wrong-num">${quizWrong}</span> ✗</span><span class="badge-topic">${w.topic}</span></div>
<div class="quiz-chinese">${w.zh}</div>
<div class="quiz-arabic-hint">${w.ar}</div>
<div class="tts-row" style="margin-bottom:16px"><button class="tts-btn" onclick="speak('${w.zh}')">${SVG_SPEAKER} استمع</button></div>
<div style="margin-bottom:10px;text-align:center">
  <div style="font-size:0.6rem;color:var(--ink4);margin-bottom:6px;font-family:Reem Kufi,serif">① أعد كتابة الحرف:</div>
  <div class="quiz-input-wrap"><input type="text" class="quiz-input" id="quizInput" placeholder="اكتب 汉字 هنا..." autocomplete="off" dir="ltr" style="font-family:LXGW WenKai TC,Noto Sans SC,sans-serif;font-size:1.4rem"/></div>
</div>
<div style="margin-bottom:12px;text-align:center">
  <div style="font-size:0.6rem;color:var(--ink4);margin-bottom:6px;font-family:Reem Kufi,serif">② حدد نوع الكلمة:</div>
  <div style="display:flex;justify-content:center;gap:6px;direction:ltr">
    <button class="cat-choice-btn" data-c="verb" onclick="selectCat('verb')" style="padding:6px 16px;border-radius:20px;border:1.5px solid rgba(0,0,0,0.08);background:transparent;color:var(--ink2);font-family:Reem Kufi,serif;font-size:0.72rem;font-weight:700;cursor:pointer;transition:all 0.2s">فعل</button>
    <button class="cat-choice-btn" data-c="noun" onclick="selectCat('noun')" style="padding:6px 16px;border-radius:20px;border:1.5px solid rgba(0,0,0,0.08);background:transparent;color:var(--ink2);font-family:Reem Kufi,serif;font-size:0.72rem;font-weight:700;cursor:pointer;transition:all 0.2s">اسم</button>
    <button class="cat-choice-btn" data-c="adj" onclick="selectCat('adj')" style="padding:6px 16px;border-radius:20px;border:1.5px solid rgba(0,0,0,0.08);background:transparent;color:var(--ink2);font-family:Reem Kufi,serif;font-size:0.72rem;font-weight:700;cursor:pointer;transition:all 0.2s">صفة</button>
  </div>
</div>
<button class="quiz-submit-btn" id="quizSubmitBtn" onclick="checkQuizAnswer()">تحقق ✓</button>
<button class="quiz-skip-btn" onclick="skipQuizQuestion()">تخطّي ←</button>
<div id="quizFeedback"></div>
</div>`;
const inp=document.getElementById('quizInput');if(inp){inp.focus();inp.addEventListener('keydown',(e)=>{if(e.key==='Enter'){if(quizAnswered)quizNext();else checkQuizAnswer();}});}
}

function checkQuizAnswer(){if(quizAnswered)return;const inp=document.getElementById('quizInput');const btn=document.getElementById('quizSubmitBtn');const fb=document.getElementById('quizFeedback');if(!inp)return;const ua=inp.value.trim();
if(!ua&&!selectedCat){inp.classList.add('shake');setTimeout(()=>inp.classList.remove('shake'),400);return;}
if(!ua){inp.classList.add('shake');setTimeout(()=>inp.classList.remove('shake'),400);return;}
if(!selectedCat){document.querySelectorAll('.cat-choice-btn').forEach(b=>{b.style.animation='shake 0.4s ease';setTimeout(()=>b.style.animation='',400);});return;}
const w=quizWords[quizIndex];const zhOk=ua===w.zh;const catOk=selectedCat===w.cat;const allOk=zhOk&&catOk;quizAnswered=true;inp.disabled=true;btn.disabled=true;
document.querySelectorAll('.cat-choice-btn').forEach(b=>{b.style.pointerEvents='none';b.style.opacity='0.6';});
const correctCatBtn=document.querySelector('.cat-choice-btn[data-c="'+w.cat+'"]');if(correctCatBtn){correctCatBtn.style.borderColor='var(--correct)';correctCatBtn.style.background='rgba(74,124,111,0.1)';correctCatBtn.style.opacity='1';}
if(!catOk&&selectedCat){const wrongBtn=document.querySelector('.cat-choice-btn[data-c="'+selectedCat+'"]');if(wrongBtn){wrongBtn.style.borderColor='var(--wrong)';wrongBtn.style.background='rgba(194,58,43,0.08)';}}
if(allOk){quizCorrect++;inp.classList.add('correct');speak(w.zh);fb.innerHTML='<div class="quiz-feedback correct-fb"><div class="quiz-fb-icon">🎉</div><div class="quiz-fb-text" style="color:var(--correct)">إجابة صحيحة!</div><div class="quiz-fb-answer"><span class="correct-answer" style="font-family:LXGW WenKai TC,sans-serif;font-size:1.4rem">'+w.zh+'</span> <span style="color:var(--gold)">'+w.py+'</span> — '+getCatLabel(w.cat)+'</div><button class="quiz-next-btn" onclick="quizNext()">التالي →</button></div>';}
else{quizWrong++;known.delete(w.zh);unknown.add(w.zh);saveState();updateCounts();let detail='';if(!zhOk)detail+='الحرف: <span class="correct-answer" style="font-family:LXGW WenKai TC,sans-serif;font-size:1.2rem">'+w.zh+'</span> (كتبت: <span style="color:var(--wrong);text-decoration:line-through;font-family:LXGW WenKai TC,sans-serif">'+ua+'</span>)<br>';if(!catOk)detail+='التصنيف: <span style="color:var(--correct)">'+getCatLabel(w.cat)+'</span> (اخترت: <span style="color:var(--wrong);text-decoration:line-through">'+getCatLabel(selectedCat)+'</span>)';
quizMistakes.push({word:w,userAnswer:ua,userCat:selectedCat,zhOk,catOk});if(!zhOk)inp.classList.add('wrong','shake');
fb.innerHTML='<div class="quiz-feedback wrong-fb"><div class="quiz-fb-icon">😅</div><div class="quiz-fb-text" style="color:var(--wrong)">'+(zhOk?'الحرف صحيح لكن التصنيف خاطئ':catOk?'التصنيف صحيح لكن الحرف خاطئ':'الحرف والتصنيف خاطئين')+'</div><div class="quiz-fb-answer" style="font-size:0.85rem">'+detail+'</div><div style="margin-top:6px;font-size:0.65rem;color:var(--wrong);opacity:0.7">⟵ تم نقل الكلمة إلى "لا أعرف"</div><div class="tts-row" style="margin-top:8px"><button class="tts-btn" onclick="speak(\''+w.zh+'\')">'+SVG_SPEAKER+' استمع</button></div><button class="quiz-next-btn" onclick="quizNext()">التالي →</button></div>';setTimeout(()=>document.querySelector('.quiz-next-btn')?.focus(),50);}
updateQuizStats();}

function skipQuizQuestion(){if(quizAnswered)return;const w=quizWords[quizIndex];quizWrong++;known.delete(w.zh);unknown.add(w.zh);saveState();updateCounts();quizMistakes.push({word:w,userAnswer:'(تخطّي)',userCat:null,zhOk:false,catOk:false});quizAnswered=true;updateQuizStats();
const fb=document.getElementById('quizFeedback');const inp=document.getElementById('quizInput');const btn=document.getElementById('quizSubmitBtn');
if(inp){inp.disabled=true;inp.classList.add('wrong');}if(btn)btn.disabled=true;
document.querySelectorAll('.cat-choice-btn').forEach(b=>{b.style.pointerEvents='none';b.style.opacity='0.6';});
const ccb=document.querySelector('.cat-choice-btn[data-c="'+w.cat+'"]');if(ccb){ccb.style.borderColor='var(--correct)';ccb.style.background='rgba(74,124,111,0.1)';ccb.style.opacity='1';}
fb.innerHTML='<div class="quiz-feedback wrong-fb"><div class="quiz-fb-icon">📖</div><div class="quiz-fb-text" style="color:var(--gold)">الإجابة:</div><div class="quiz-fb-answer"><span class="correct-answer" style="font-family:LXGW WenKai TC,sans-serif;font-size:1.4rem">'+w.zh+'</span> <span style="color:var(--gold)">'+w.py+'</span> — '+getCatLabel(w.cat)+'</div><div style="margin-top:6px;font-size:0.65rem;color:var(--wrong);opacity:0.7">⟵ تم نقل الكلمة إلى "لا أعرف"</div><div class="tts-row" style="margin-top:8px"><button class="tts-btn" onclick="speak(\''+w.zh+'\')">'+SVG_SPEAKER+' استمع</button></div><button class="quiz-next-btn" onclick="quizNext()">التالي →</button></div>';setTimeout(()=>document.querySelector('.quiz-next-btn')?.focus(),50);}

function quizNext(){quizIndex++;renderQuizCard();}

function renderQuizSummary(){const a=document.getElementById('cardArea');const t=quizWords.length;const pct=t>0?Math.round((quizCorrect/t)*100):0;
let emoji='🎉',msg='ممتاز!';if(pct<30){emoji='💪';msg='استمر!';}else if(pct<60){emoji='📚';msg='جيد، واصل!';}else if(pct<80){emoji='👏';msg='أحسنت!';}else if(pct<100){emoji='🌟';msg='رائع!';}
document.getElementById('progressFill').style.width='100%';document.getElementById('progressText').textContent=t+' / '+t;
let mHTML='';if(quizMistakes.length>0){mHTML='<div class="quiz-mistakes-list"><div class="quiz-mistakes-title">تحتاج مراجعة ('+quizMistakes.length+')</div>';quizMistakes.forEach(m=>{let err='';if(!m.zhOk)err+='<span style="color:var(--wrong);font-family:LXGW WenKai TC,sans-serif">'+m.userAnswer+'</span> ';if(!m.catOk&&m.userCat)err+='<span style="color:var(--wrong);font-size:0.65rem">'+getCatLabel(m.userCat)+'</span>';if(!err)err='(تخطّي)';mHTML+='<div class="quiz-mistake-item"><span class="mistake-zh">'+m.word.zh+'</span><span class="mistake-correct">'+m.word.py+' · '+getCatLabel(m.word.cat)+'</span><span class="mistake-yours">'+err+'</span></div>';});mHTML+='</div>';}
a.innerHTML='<div class="quiz-summary"><div class="quiz-summary-title">نتيجة الاختبار</div><div class="quiz-summary-emoji">'+emoji+'</div><div class="quiz-score-display" style="color:'+(pct>=60?'var(--correct)':'var(--wrong)')+'">%'+pct+'</div><div class="quiz-score-label">'+msg+'</div><div class="quiz-summary-details"><div class="quiz-detail"><div class="quiz-detail-num" style="color:var(--correct)">'+quizCorrect+'</div><div class="quiz-detail-label">صحيح</div></div><div class="quiz-detail"><div class="quiz-detail-num" style="color:var(--wrong)">'+quizWrong+'</div><div class="quiz-detail-label">خطأ</div></div><div class="quiz-detail"><div class="quiz-detail-num" style="color:var(--gold)">'+t+'</div><div class="quiz-detail-label">إجمالي</div></div></div>'+mHTML+'<button class="quiz-restart-btn" onclick="startQuiz()">🔄 إعادة</button></div>';}

// Keyboard & Touch
document.addEventListener('keydown',e=>{if(currentMode==='quiz')return;if(e.target.tagName==='INPUT')return;if(e.key==='ArrowLeft')goNext();else if(e.key==='ArrowRight')goPrev();else if(e.key===' '){e.preventDefault();flipCard();}else if(e.key==='1')markKnown();else if(e.key==='2')markUnknown();});
let touchStartX=0;document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});document.addEventListener('touchend',e=>{if(currentMode==='quiz')return;const d=touchStartX-e.changedTouches[0].clientX;if(Math.abs(d)>60){if(d>0)goNext();else goPrev();}});

// Event Listeners
document.querySelectorAll('.fbtn').forEach(b=>{b.addEventListener('click',()=>setFilter(b.dataset.cat));});
document.getElementById('prevBtn').addEventListener('click',goPrev);
document.getElementById('nextBtn').addEventListener('click',goNext);
document.getElementById('knowBtn').addEventListener('click',markKnown);
document.getElementById('dontKnowBtn').addEventListener('click',markUnknown);
document.getElementById('shuffleBtn').addEventListener('click',shuffleCards);

// Init
buildTopicFilters();updateCounts();renderCard();updateProgress();
</script>
</body>
</html>
