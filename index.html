<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>脴篓脴路脴搂脵聜脴搂脴陋 HSK4 脴搂脵聞脴陋脴鹿脵聞脵聤脵聟脵聤脴漏</title>
<!-- Fonts: try Google first, fallback handled by CSS -->
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Amiri:wght@400;700&family=LXGW+WenKai+TC:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Amiri:wght@400;700&family=LXGW+WenKai+TC:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.loli.net/css2?family=Reem+Kufi:wght@400;500;600;700&family=Amiri:wght@400;700&family=LXGW+WenKai+TC:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"></noscript>
<style>
:root {
  --ink:#1a1a1a;--ink2:#2c2318;--ink3:#5c4a3a;--ink4:#8a7560;
  --paper:#f5efe0;--paper2:#e8dcc8;--paper3:#faf6ed;
  --red:#c23a2b;--red2:#d4574a;--gold:#b8943e;--gold2:#d4b86a;
  --jade:#4a7c6f;--jade2:#6a9e8e;--blue:#3a6fa0;
  --verb:var(--red);--noun:var(--blue);--adj:var(--jade);
  --correct:var(--jade);--wrong:var(--red);--shadow:rgba(44,35,24,0.1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;overflow:hidden}
body{
  font-family:'Amiri','Reem Kufi','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--paper);color:var(--ink2);
  height:100%;display:flex;flex-direction:column;overflow:hidden;
  padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
  background-image:
    radial-gradient(circle at 20% 80%,rgba(194,58,43,0.03) 0%,transparent 50%),
    radial-gradient(circle at 80% 20%,rgba(184,148,62,0.04) 0%,transparent 50%);
}
/* === TOP BAR === */
.topbar{
  padding:8px 12px 6px;display:flex;flex-wrap:wrap;align-items:center;gap:6px;
  flex-shrink:0;position:relative;z-index:20;
}
.topbar::after{
  content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,var(--ink4),transparent);opacity:0.3;
}
.topbar-row1{display:flex;align-items:center;gap:8px;width:100%;}
.logo{
  font-family:'Reem Kufi','PingFang SC','Microsoft YaHei',sans-serif;font-size:0.85rem;font-weight:700;color:var(--ink);
  display:flex;align-items:center;gap:5px;white-space:nowrap;
}
.logo .seal{
  display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;border:1.5px solid var(--red);border-radius:3px;
  font-family:'LXGW WenKai TC',sans-serif;font-size:10px;color:var(--red);
  transform:rotate(-2deg);line-height:1;font-weight:700;
}
.topbar-stats{
  display:flex;gap:8px;margin-right:auto;margin-left:0;font-size:0.62rem;color:var(--ink4);
}
.topbar-stats span{font-weight:700;}
.topbar-stats .s-known{color:var(--jade);}
.topbar-stats .s-unknown{color:var(--red);}
.topbar-row2{display:flex;align-items:center;gap:6px;width:100%;justify-content:center;}
.mode-toggle{
  display:flex;background:var(--paper2);border-radius:20px;padding:2px;
  border:1px solid rgba(0,0,0,0.05);flex:1;max-width:260px;
}
.mode-toggle button{
  padding:5px 0;border:none;border-radius:18px;background:transparent;
  font-family:'Reem Kufi','PingFang SC','Microsoft YaHei',sans-serif;font-size:0.68rem;font-weight:600;
  color:var(--ink4);cursor:pointer;transition:all 0.3s;flex:1;
}
.mode-toggle button.active{background:var(--red);color:#fff;box-shadow:0 2px 8px rgba(194,58,43,0.25);}

/* === FILTERS STRIP === */
.filters-strip{
  display:flex;gap:5px;padding:8px 12px 4px;overflow-x:auto;flex-shrink:0;
  scrollbar-width:none;-ms-overflow-style:none;
}
.filters-strip::-webkit-scrollbar{display:none}
.fbtn{
  padding:5px 14px;border-radius:20px;border:1px solid rgba(0,0,0,0.08);
  background:var(--paper3);font-family:'Reem Kufi','PingFang SC','Microsoft YaHei',sans-serif;font-size:0.68rem;
  font-weight:600;color:var(--ink4);cursor:pointer;white-space:nowrap;
  transition:all 0.25s;flex-shrink:0;
}
.fbtn:hover{border-color:var(--gold);}
.fbtn.active{background:var(--gold);color:#fff;border-color:var(--gold);box-shadow:0 2px 8px rgba(184,148,62,0.2);}
.fbtn[data-cat="verb"].active{background:var(--red);border-color:var(--red);box-shadow:0 2px 8px rgba(194,58,43,0.2);}
.fbtn[data-cat="noun"].active{background:var(--blue);border-color:var(--blue);box-shadow:0 2px 8px rgba(58,111,160,0.2);}
.fbtn[data-cat="adj"].active{background:var(--jade);border-color:var(--jade);box-shadow:0 2px 8px rgba(74,124,111,0.2);}

.topics-strip{display:flex;gap:4px;padding:0 12px 4px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.topics-strip::-webkit-scrollbar{display:none}
.tbtn{
  padding:3px 10px;border-radius:12px;border:1px solid rgba(0,0,0,0.06);
  background:transparent;font-family:'Amiri','PingFang SC',serif;font-size:0.6rem;
  color:var(--ink4);cursor:pointer;white-space:nowrap;transition:all 0.25s;flex-shrink:0;
}
.tbtn.active{background:rgba(184,148,62,0.1);border-color:var(--gold);color:var(--gold);}

/* === PROGRESS === */
.progress-strip{padding:0 12px 4px;flex-shrink:0;display:flex;align-items:center;gap:8px;}
.progress-track{flex:1;height:2px;background:var(--paper2);border-radius:2px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:2px;transition:width 0.4s ease;width:0%;}
.progress-label{font-size:0.6rem;color:var(--ink4);font-family:'Reem Kufi','PingFang SC','Microsoft YaHei',sans-serif;white-space:nowrap;min-width:36px;text-align:center;}

/* === CARD HERO AREA === */
.card-hero{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:4px 8px;position:relative;z-index:10;
  min-height:0;overflow:hidden;
}
.card-container{perspective:1400px;width:100%;max-width:380px;padding:0 12px;}
.card{
  position:relative;width:100%;transform-style:preserve-3d;
  transition:transform 0.7s cubic-bezier(0.4,0.2,0.2,1);cursor:pointer;
}
.card.flipped{transform:rotateY(180deg);}

.card-face{
  backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;
  box-shadow:0 8px 40px var(--shadow),0 2px 8px rgba(0,0,0,0.04);
  position:relative;
  background:var(--paper3);
  border:1px solid rgba(0,0,0,0.04);
}
/* Side accent line */
.card-face::before{
  content:'';position:absolute;top:12px;bottom:12px;right:0;width:3px;
  background:linear-gradient(180deg,var(--red),var(--gold));border-radius:3px;
}
/* Corner ornament */
.card-face::after{
  content:'';position:absolute;top:8px;left:8px;width:24px;height:24px;
  border-top:1.5px solid var(--ink4);border-left:1.5px solid var(--ink4);opacity:0.12;
}
.card-front{
  position:relative;padding:28px 20px 16px;overflow:hidden;
  justify-content:center;align-items:center;text-align:center;
  min-height:250px;
}
.card-back{
  position:absolute;top:0;left:0;width:100%;min-height:100%;
  padding:24px 20px;transform:rotateY(180deg);direction:rtl;
  overflow-y:auto;max-height:100%;
}

/* Badges */
.badge-cat{
  position:absolute;top:10px;right:10px;padding:2px 8px;border-radius:3px;
  font-family:'Reem Kufi','PingFang SC','Microsoft YaHei',sans-serif;font-size:0.52rem;font-weight:700;color:#fff;
  letter-spacing:0.3px;
}
.badge-cat.verb{background:var(--red)}.badge-cat.noun{background:var(--blue)}.badge-cat.adj{background:var(--jade)}
.badge-topic{
  position:absolute;top:10px;left:10px;padding:2px 6px;border-radius:3px;
  font-size:0.5rem;color:var(--ink4);background:rgba(0,0,0,0.03);
  border:1px solid rgba(0,0,0,0.04);font-family:'Amiri','PingFang SC',serif;
}

/* Card content */
.hz{
  font-family:'LXGW WenKai TC','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
  font-size:clamp(2.6rem,9vw,4rem);font-weight:700;color:var(--ink);
  line-height:1.15;margin:4px 0 4px;
  text-shadow:0 2px 20px rgba(44,35,24,0.06);
  transition:transform 0.3s;
}
.card:hover .hz{transform:scale(1.03);}
.py{font-size:0.9rem;color:var(--gold);font-style:italic;margin-bottom:2px;font-family:'Amiri','PingFang SC',serif;}
.ar{font-size:0.88rem;color:var(--ink2);font-weight:600;font-family:'Amiri','PingFang SC',serif;}

/* TTS */
.tts-row{display:flex;gap:6px;margin-top:8px;direction:ltr;justify-content:center;flex-wrap:wrap;}
.tts-btn{
  background:var(--red);border:none;border-radius:20px;padding:6px 14px;
  color:#fff;font-family:'Reem Kufi','PingFang SC','Microsoft YaHei',sans-serif;font-size:0.68rem;font-weight:600;
  cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:4px;
}
.tts-btn:hover{transform:scale(1.06);box-shadow:0 3px 12px rgba(194,58,43,0.25);}
.tts-btn:active{transform:scale(0.95);}
.tts-btn svg{width:13px;height:13px;}

/* Practice input */
.practice-wrap{margin-top:8px;width:100%;max-width:180px;text-align:center;}
.practice-label{font-size:0.55rem;color:var(--ink4);margin-bottom:3px;font-family:'Amiri','PingFang SC',serif;}
.practice-row{display:flex;gap:4px;direction:ltr;align-items:center;justify-content:center;}
.practice-input{
  width:100%;padding:5px 8px;border-radius:8px;border:1.5px solid rgba(0,0,0,0.08);
  background:#fff;color:var(--ink);font-family:'LXGW WenKai TC','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
  font-size:1.2rem;text-align:center;outline:none;transition:all 0.3s;
}
.practice-input:focus{border-color:var(--gold);box-shadow:0 0 12px rgba(184,148,62,0.15);}
.practice-icon{font-size:1rem;min-width:18px;}

.card-counter{font-size:0.6rem;color:var(--ink4);margin-top:8px;font-family:'Reem Kufi','PingFang SC','Microsoft YaHei',sans-serif;}

/* Back face */
.back-label{font-family:'Reem Kufi','PingFang SC','Microsoft YaHei',sans-serif;font-size:0.6rem;color:var(--red);font-weight:700;letter-spacing:0.5px;margin-bottom:4px;}
.back-hz{font-family:'LXGW WenKai TC','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;font-size:1.4rem;font-weight:700;color:var(--ink);direction:ltr;text-align:left;margin-bottom:2px;}
.back-py{font-size:0.8rem;color:var(--gold);font-style:italic;direction:ltr;text-align:left;margin-bottom:4px;}
.back-ar{font-size:0.85rem;color:var(--ink2);line-height:1.5;margin-bottom:12px;}
.sent-box{
  background:rgba(0,0,0,0.015);border:1px solid rgba(0,0,0,0.04);border-radius:10px;
  padding:12px;border-right:2.5px solid var(--gold2);
}
.sent-zh{font-family:'LXGW WenKai TC','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;font-size:1rem;font-weight:500;color:var(--ink);direction:ltr;text-align:left;line-height:1.6;margin-bottom:3px;}
.sent-py{font-size:0.7rem;color:var(--gold);font-style:italic;direction:ltr;text-align:left;margin-bottom:4px;opacity:0.8;}
.sent-ar{font-size:0.78rem;color:var(--ink3);line-height:1.5;}

/* === SENTENCE EVAL === */
.eval-wrap{
  margin-top:12px;border-top:1px solid rgba(0,0,0,0.05);padding-top:10px;
}
.eval-label{font-family:'Reem Kufi','PingFang SC','Microsoft YaHei',sans-serif;font-size:0.6rem;color:var(--red);font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.eval-input-row{display:flex;gap:6px;direction:ltr;align-items:center;}
.eval-input{
  flex:1;padding:8px 10px;border-radius:8px;border:1.5px solid rgba(0,0,0,0.08);
  background:#fff;color:var(--ink);font-family:'LXGW WenKai TC','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
  font-size:0.9rem;outline:none;transition:all 0.3s;direction:ltr;text-align:left;
}
.eval-input:focus{border-color:var(--gold);box-shadow:0 0 10px rgba(184,148,62,0.12);}
.eval-input::placeholder{color:var(--ink4);font-size:0.7rem;font-family:'Amiri','PingFang SC',serif;direction:rtl;text-align:right;}
.eval-send{
  width:36px;height:36px;border-radius:50%;border:none;background:var(--gold);
  color:#fff;font-size:1rem;cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.eval-send:hover{background:var(--gold2);transform:scale(1.08);}
.eval-send:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.eval-send.loading{animation:spin 0.8s linear infinite;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.eval-result{
  margin-top:8px;padding:10px 12px;border-radius:10px;
  font-size:0.75rem;line-height:1.7;direction:rtl;
  animation:feedbackIn 0.3s ease;
}
.eval-result.pass{background:rgba(74,124,111,0.06);border:1px solid rgba(74,124,111,0.15);border-right:3px solid var(--jade);}
.eval-result.fail{background:rgba(194,58,43,0.04);border:1px solid rgba(194,58,43,0.1);border-right:3px solid var(--red);}
.eval-result.partial{background:rgba(184,148,62,0.06);border:1px solid rgba(184,148,62,0.15);border-right:3px solid var(--gold);}
.eval-score{
  display:inline-flex;align-items:center;gap:3px;padding:2px 10px;border-radius:12px;
  font-family:'Reem Kufi','PingFang SC','Microsoft YaHei',sans-serif;font-weight:700;font-size:0.7rem;margin-bottom:6px;
}
.eval-score.high{background:rgba(74,124,111,0.12);color:var(--jade);}
.eval-score.mid{background:rgba(184,148,62,0.12);color:var(--gold);}
.eval-score.low{background:rgba(194,58,43,0.1);color:var(--red);}
.eval-line{margin-bottom:4px;color:var(--ink3);}
.eval-line b{color:var(--ink);}
.eval-corrected{
  display:block;direction:ltr;text-align:left;padding:4px 8px;margin-top:4px;
  border-radius:6px;background:rgba(74,124,111,0.05);
  font-family:'LXGW WenKai TC',sans-serif;font-size:0.85rem;color:var(--jade);font-weight:600;
}

/* === BOTTOM NAV === */
.bottom-nav{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  gap:8px;padding:8px 12px 12px;
  background:linear-gradient(0deg,var(--paper2) 0%,var(--paper) 100%);
  border-top:1px solid rgba(0,0,0,0.04);
  position:relative;z-index:20;
}
.bn-action{
  padding:10px 18px;border-radius:12px;border:none;
  font-family:'Reem Kufi','PingFang SC','Microsoft YaHei',sans-serif;font-size:0.75rem;font-weight:700;
  cursor:pointer;transition:all 0.2s;color:#fff;flex:1;max-width:120px;
}
.bn-know{background:var(--jade);}
.bn-dont{background:var(--red);}
.bn-action:active{transform:scale(0.94);}
.bn-arrow{
  width:42px;height:42px;border-radius:50%;background:var(--paper3);
  border:1px solid rgba(0,0,0,0.06);color:var(--ink2);font-size:1.1rem;
  cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px var(--shadow);flex-shrink:0;
}
.bn-arrow:active{transform:scale(0.9);}
.bn-shuffle{
  position:absolute;top:-22px;left:50%;transform:translateX(-50%);
  padding:3px 12px;border-radius:10px;background:var(--paper3);
  border:1px solid rgba(0,0,0,0.06);font-family:'Reem Kufi','PingFang SC','Microsoft YaHei',sans-serif;
  font-size:0.6rem;color:var(--ink4);cursor:pointer;white-space:nowrap;
  box-shadow:0 1px 4px var(--shadow);transition:all 0.2s;
}
.bn-shuffle:hover{border-color:var(--gold);color:var(--gold);}

/* === ANIMATIONS === */
.card-enter{animation:heroIn 0.5s cubic-bezier(0.22,1,0.36,1);}
@keyframes heroIn{
  from{opacity:0;transform:translateY(24px) scale(0.94) rotateX(4deg);}
  to{opacity:1;transform:translateY(0) scale(1) rotateX(0);}
}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shake{animation:shake 0.4s ease;}
@keyframes feedbackIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* === QUIZ === */
.quiz-card{
  width:100%;max-width:380px;background:var(--paper3);border-radius:16px;
  border:1px solid rgba(0,0,0,0.04);padding:28px 20px;text-align:center;
  box-shadow:0 8px 40px var(--shadow);position:relative;overflow:hidden;
}
.quiz-card::before{content:'';position:absolute;top:12px;bottom:12px;right:0;width:3px;background:linear-gradient(180deg,var(--red),var(--gold));border-radius:3px;}
.quiz-card.card-enter{animation:heroIn 0.5s cubic-bezier(0.22,1,0.36,1);}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.quiz-score-badge{padding:4px 10px;border-radius:12px;font-size:0.65rem;font-weight:700;background:rgba(0,0,0,0.03);color:var(--ink3);direction:ltr;font-family:'Reem Kufi','PingFang SC','Microsoft YaHei',sans-serif;}
.quiz-score-badge .correct-num{color:var(--jade)}.quiz-score-badge .wrong-num{color:var(--red)}
.quiz-chinese{font-family:'LXGW WenKai TC','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;font-size:clamp(3rem,12vw,5rem);font-weight:700;color:var(--ink);margin:12px 0;line-height:1.15;}
.quiz-arabic-hint{font-size:0.85rem;color:var(--ink3);margin-bottom:16px;font-family:'Amiri','PingFang SC',serif;}
.quiz-input-wrap{position:relative;margin:0 auto 12px;max-width:280px;direction:ltr;}
.quiz-input{
  width:100%;padding:12px 16px;border-radius:12px;border:2px solid rgba(0,0,0,0.08);
  background:#fff;color:var(--ink);font-family:inherit;font-size:1.1rem;
  text-align:center;outline:none;transition:all 0.3s;
}
.quiz-input::placeholder{color:var(--ink4);font-size:0.8rem}
.quiz-input:focus{border-color:var(--gold);box-shadow:0 0 16px rgba(184,148,62,0.15);}
.quiz-input.correct{border-color:var(--jade);box-shadow:0 0 12px rgba(74,124,111,0.2);background:rgba(74,124,111,0.04);}
.quiz-input.wrong{border-color:var(--red);box-shadow:0 0 12px rgba(194,58,43,0.15);background:rgba(194,58,43,0.03);}
.quiz-submit-btn{padding:10px 36px;border-radius:12px;border:none;background:var(--red);color:#fff;font-family:'Reem Kufi','PingFang SC','Microsoft YaHei',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-bottom:6px;}
.quiz-submit-btn:hover{box-shadow:0 4px 16px rgba(194,58,43,0.25);}
.quiz-submit-btn:disabled{opacity:0.4;cursor:not-allowed}
.quiz-skip-btn{display:block;margin:4px auto 0;padding:6px 16px;border-radius:8px;border:1px solid rgba(0,0,0,0.08);background:transparent;color:var(--ink4);font-family:'Amiri','PingFang SC',serif;font-size:0.7rem;cursor:pointer;}
.quiz-feedback{margin-top:12px;padding:14px;border-radius:12px;animation:feedbackIn 0.3s ease;}
.quiz-feedback.correct-fb{background:rgba(74,124,111,0.06);border:1px solid rgba(74,124,111,0.15);border-right:3px solid var(--jade);}
.quiz-feedback.wrong-fb{background:rgba(194,58,43,0.04);border:1px solid rgba(194,58,43,0.1);border-right:3px solid var(--red);}
.quiz-fb-icon{font-size:1.8rem;margin-bottom:6px}.quiz-fb-text{font-size:0.8rem;font-weight:600;margin-bottom:3px;}
.quiz-fb-answer{font-size:1rem;font-weight:700;direction:ltr;margin-top:3px;}.quiz-fb-answer .correct-answer{color:var(--jade);}
.quiz-next-btn{margin-top:10px;padding:8px 24px;border-radius:10px;border:1px solid rgba(0,0,0,0.06);background:var(--paper2);color:var(--ink2);font-family:'Reem Kufi','PingFang SC','Microsoft YaHei',sans-serif;font-size:0.8rem;font-weight:700;cursor:pointer;}

  const url=DS_URLS[attempt % DS_URLS.length];
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),15000);
  try{
    const resp=await fetch(url,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+DS_KEY},
      body:JSON.stringify({model:'qwen-flash',messages:[{role:'user',content:prompt}],temperature:0.1}),
      signal:controller.signal
    });

    const data=await resp.json();
    if(!resp.ok)throw new Error(data.error?.message||'脴庐脴路脴拢 '+resp.status);
    return data.choices?.[0]?.message?.content||'';

    html+=`<div class="eval-line">${ev.feedback}</div>`;
    
    if(ev.correction){
      html+=`<span class="eval-corrected">${ev.correction}</span>`;
      if(ev.pinyin) html+=`<div style="direction:ltr;text-align:left;font-size:0.65rem;color:var(--gold);margin-top:2px;font-style:italic">${ev.pinyin}</div>`;
    }
    
    html+=`</div>`;
    res.innerHTML=html;
    
    // Speak the corrected sentence
    if(ev.correction) setTimeout(()=>speak(ev.correction),500);
    else setTimeout(()=>speak(sentence),500);
    
  }catch(e){
    console.error('AI eval error:',e);
    res.innerHTML=`<div class="eval-result fail"><div class="eval-line" style="color:var(--red)">脴庐脴路脴拢: ${e.message}</div></div>`;
  }finally{
    btn.disabled=false;btn.classList.remove('loading');btn.textContent='芒卢聠';
  }
}
function goNext(){if(!filteredWords.length)return;currentIndex=(currentIndex+1)%filteredWords.length;isFlipped=false;renderCard();updateProgress();}
function goPrev(){if(!filteredWords.length)return;currentIndex=(currentIndex-1+filteredWords.length)%filteredWords.length;isFlipped=false;renderCard();updateProgress();}
function markKnown(){if(!filteredWords.length)return;known.add(filteredWords[currentIndex].zh);unknown.delete(filteredWords[currentIndex].zh);saveState();updateCounts();goNext();}
function markUnknown(){if(!filteredWords.length)return;unknown.add(filteredWords[currentIndex].zh);known.delete(filteredWords[currentIndex].zh);saveState();updateCounts();goNext();}
function shuffleCards(){filteredWords.sort(()=>Math.random()-0.5);currentIndex=0;isFlipped=false;renderCard();updateProgress();}

function startQuiz(){quizWords=filteredWords.filter(w=>known.has(w.zh));quizWords.sort(()=>Math.random()-0.5);quizIndex=0;quizCorrect=0;quizWrong=0;quizMistakes=[];updateQuizStats();renderQuizCard();}
function selectCat(c){selectedCat=c;document.querySelectorAll('.cat-choice-btn').forEach(b=>{b.style.borderColor=b.dataset.c===c?'var(--gold)':'rgba(0,0,0,0.08)';b.style.background=b.dataset.c===c?'rgba(184,148,62,0.1)':'transparent';});}

function renderQuizCard(){const a=document.getElementById('cardArea');if(!quizWords.length){a.innerHTML='<div class="empty-state"><div class="emoji">冒聼聯聺</div><p>脵聞脴搂 脴陋脵聢脴卢脴炉 脵聝脵聞脵聟脴搂脴陋 脵聟脴颅脴炉脴炉脴漏 脴篓脵聙 "脴拢脴鹿脴卤脵聛脵聡脴搂" 脴篓脴鹿脴炉!<br>脴搂脴卤脴卢脴鹿 脵聞脵聢脴露脴鹿 脴搂脵聞脴篓脴路脴搂脵聜脴搂脴陋 脵聢脴搂脴露脴潞脴路 "芒聹聯 脴拢脴鹿脴卤脵聛".</p></div>';return;}
if(quizIndex>=quizWords.length){renderQuizSummary();return;}
const w=quizWords[quizIndex];quizAnswered=false;selectedCat=null;
const pct=((quizIndex+1)/quizWords.length*100);
document.getElementById('progressFill').style.width=pct+'%';
document.getElementById('progressText').textContent=(quizIndex+1)+' / '+quizWords.length;
a.innerHTML=`<div class="quiz-card card-enter">
<div class="quiz-header"><span class="quiz-score-badge"><span class="correct-num">${quizCorrect}</span> 芒聹聯 | <span class="wrong-num">${quizWrong}</span> 芒聹聴</span><span class="badge-topic">${w.topic}</span></div>
<div class="quiz-chinese">${w.zh}</div>
<div class="quiz-arabic-hint">${w.ar}</div>
<div class="tts-row" style="margin-bottom:16px"><button class="tts-btn" onclick="speak('${w.zh}')">${SVG_SPEAKER} 脴搂脴鲁脴陋脵聟脴鹿</button></div>
<div style="margin-bottom:10px;text-align:center">
  <div style="font-size:0.6rem;color:var(--ink4);margin-bottom:6px;font-family:Reem Kufi,serif">芒聭聽 脴拢脴鹿脴炉 脵聝脴陋脴搂脴篓脴漏 脴搂脵聞脴颅脴卤脵聛:</div>
  <div class="quiz-input-wrap"><input type="text" class="quiz-input" id="quizInput" placeholder="脴搂脵聝脴陋脴篓 忙卤聣氓颅聴 脵聡脵聠脴搂..." autocomplete="off" dir="ltr" style="font-family:LXGW WenKai TC,Noto Sans SC,sans-serif;font-size:1.4rem"/></div>
</div>

  <div style="font-size:0.6rem;color:var(--ink4);margin-bottom:6px;font-family:Reem Kufi,serif">芒聭隆 脴颅脴炉脴炉 脵聠脵聢脴鹿 脴搂脵聞脵聝脵聞脵聟脴漏:</div>
  <div style="display:flex;justify-content:center;gap:6px;direction:ltr">
    <button class="cat-choice-btn" data-c="verb" onclick="selectCat('verb')" style="padding:6px 16px;border-radius:20px;border:1.5px solid rgba(0,0,0,0.08);background:transparent;color:var(--ink2);font-family:Reem Kufi,serif;font-size:0.72rem;font-weight:700;cursor:pointer;transition:all 0.2s">脵聛脴鹿脵聞</button>
    <button class="cat-choice-btn" data-c="noun" onclick="selectCat('noun')" style="padding:6px 16px;border-radius:20px;border:1.5px solid rgba(0,0,0,0.08);background:transparent;color:var(--ink2);font-family:Reem Kufi,serif;font-size:0.72rem;font-weight:700;cursor:pointer;transition:all 0.2s">脴搂脴鲁脵聟</button>
    <button class="cat-choice-btn" data-c="adj" onclick="selectCat('adj')" style="padding:6px 16px;border-radius:20px;border:1.5px solid rgba(0,0,0,0.08);background:transparent;color:var(--ink2);font-family:Reem Kufi,serif;font-size:0.72rem;font-weight:700;cursor:pointer;transition:all 0.2s">脴碌脵聛脴漏</button>
  </div>
</div>
<button class="quiz-submit-btn" id="quizSubmitBtn" onclick="checkQuizAnswer()">脴陋脴颅脵聜脵聜 芒聹聯</button>
<button class="quiz-skip-btn" onclick="skipQuizQuestion()">脴陋脴庐脴路脵聭脵聤 芒聠聬</button>
<div id="quizFeedback"></div>
</div>`;
const inp=document.getElementById('quizInput');if(inp){inp.focus();inp.addEventListener('keydown',(e)=>{if(e.key==='Enter'){if(quizAnswered)quizNext();else checkQuizAnswer();}});}
}

function checkQuizAnswer(){if(quizAnswered)return;const inp=document.getElementById('quizInput');const btn=document.getElementById('quizSubmitBtn');const fb=document.getElementById('quizFeedback');if(!inp)return;const ua=inp.value.trim();
if(!ua&&!selectedCat){inp.classList.add('shake');setTimeout(()=>inp.classList.remove('shake'),400);return;}
if(!ua){inp.classList.add('shake');setTimeout(()=>inp.classList.remove('shake'),400);return;}
if(!selectedCat){document.querySelectorAll('.cat-choice-btn').forEach(b=>{b.style.animation='shake 0.4s ease';setTimeout(()=>b.style.animation='',400);});return;}
const w=quizWords[quizIndex];const zhOk=ua===w.zh;const catOk=selectedCat===w.cat;const allOk=zhOk&&catOk;quizAnswered=true;inp.disabled=true;btn.disabled=true;
document.querySelectorAll('.cat-choice-btn').forEach(b=>{b.style.pointerEvents='none';b.style.opacity='0.6';});
const correctCatBtn=document.querySelector('.cat-choice-btn[data-c="'+w.cat+'"]');if(correctCatBtn){correctCatBtn.style.borderColor='var(--correct)';correctCatBtn.style.background='rgba(74,124,111,0.1)';correctCatBtn.style.opacity='1';}
if(!catOk&&selectedCat){const wrongBtn=document.querySelector('.cat-choice-btn[data-c="'+selectedCat+'"]');if(wrongBtn){wrongBtn.style.borderColor='var(--wrong)';wrongBtn.style.background='rgba(194,58,43,0.08)';}}
if(allOk){quizCorrect++;inp.classList.add('correct');speak(w.zh);fb.innerHTML='<div class="quiz-feedback correct-fb"><div class="quiz-fb-icon">冒聼聨聣</div><div class="quiz-fb-text" style="color:var(--correct)">脴楼脴卢脴搂脴篓脴漏 脴碌脴颅脵聤脴颅脴漏!</div><div class="quiz-fb-answer"><span class="correct-answer" style="font-family:LXGW WenKai TC,sans-serif;font-size:1.4rem">'+w.zh+'</span> <span style="color:var(--gold)">'+w.py+'</span> 芒聙聰 '+getCatLabel(w.cat)+'</div><button class="quiz-next-btn" onclick="quizNext()">脴搂脵聞脴陋脴搂脵聞脵聤 芒聠聮</button></div>';}
else{quizWrong++;known.delete(w.zh);unknown.add(w.zh);saveState();updateCounts();let detail='';if(!zhOk)detail+='脴搂脵聞脴颅脴卤脵聛: <span class="correct-answer" style="font-family:LXGW WenKai TC,sans-serif;font-size:1.2rem">'+w.zh+'</span> (脵聝脴陋脴篓脴陋: <span style="color:var(--wrong);text-decoration:line-through;font-family:LXGW WenKai TC,sans-serif">'+ua+'</span>)<br>';if(!catOk)detail+='脴搂脵聞脴陋脴碌脵聠脵聤脵聛: <span style="color:var(--correct)">'+getCatLabel(w.cat)+'</span> (脴搂脴庐脴陋脴卤脴陋: <span style="color:var(--wrong);text-decoration:line-through">'+getCatLabel(selectedCat)+'</span>)';
quizMistakes.push({word:w,userAnswer:ua,userCat:selectedCat,zhOk,catOk});if(!zhOk)inp.classList.add('wrong','shake');
fb.innerHTML='<div class="quiz-feedback wrong-fb"><div class="quiz-fb-icon">冒聼聵聟</div><div class="quiz-fb-text" style="color:var(--wrong)">'+(zhOk?'脴搂脵聞脴颅脴卤脵聛 脴碌脴颅脵聤脴颅 脵聞脵聝脵聠 脴搂脵聞脴陋脴碌脵聠脵聤脵聛 脴庐脴搂脴路脴娄':catOk?'脴搂脵聞脴陋脴碌脵聠脵聤脵聛 脴碌脴颅脵聤脴颅 脵聞脵聝脵聠 脴搂脵聞脴颅脴卤脵聛 脴庐脴搂脴路脴娄':'脴搂脵聞脴颅脴卤脵聛 脵聢脴搂脵聞脴陋脴碌脵聠脵聤脵聛 脴庐脴搂脴路脴娄脵聤脵聠')+'</div><div class="quiz-fb-answer" style="font-size:0.85rem">'+detail+'</div><div style="margin-top:6px;font-size:0.65rem;color:var(--wrong);opacity:0.7">芒聼碌 脴陋脵聟 脵聠脵聜脵聞 脴搂脵聞脵聝脵聞脵聟脴漏 脴楼脵聞脵聣 "脵聞脴搂 脴拢脴鹿脴卤脵聛"</div><div class="tts-row" style="margin-top:8px"><button class="tts-btn" onclick="speak(\''+w.zh+'\')">'+SVG_SPEAKER+' 脴搂脴鲁脴陋脵聟脴鹿</button></div><button class="quiz-next-btn" onclick="quizNext()">脴搂脵聞脴陋脴搂脵聞脵聤 芒聠聮</button></div>';setTimeout(()=>document.querySelector('.quiz-next-btn')?.focus(),50);}
updateQuizStats();}

function skipQuizQuestion(){if(quizAnswered)return;const w=quizWords[quizIndex];quizWrong++;known.delete(w.zh);unknown.add(w.zh);saveState();updateCounts();quizMistakes.push({word:w,userAnswer:'(脴陋脴庐脴路脵聭脵聤)',userCat:null,zhOk:false,catOk:false});quizAnswered=true;updateQuizStats();
const fb=document.getElementById('quizFeedback');const inp=document.getElementById('quizInput');const btn=document.getElementById('quizSubmitBtn');
if(inp){inp.disabled=true;inp.classList.add('wrong');}if(btn)btn.disabled=true;
document.querySelectorAll('.cat-choice-btn').forEach(b=>{b.style.pointerEvents='none';b.style.opacity='0.6';});
const ccb=document.querySelector('.cat-choice-btn[data-c="'+w.cat+'"]');if(ccb){ccb.style.borderColor='var(--correct)';ccb.style.background='rgba(74,124,111,0.1)';ccb.style.opacity='1';}
fb.innerHTML='<div class="quiz-feedback wrong-fb"><div class="quiz-fb-icon">冒聼聯聳</div><div class="quiz-fb-text" style="color:var(--gold)">脴搂脵聞脴楼脴卢脴搂脴篓脴漏:</div><div class="quiz-fb-answer"><span class="correct-answer" style="font-family:LXGW WenKai TC,sans-serif;font-size:1.4rem">'+w.zh+'</span> <span style="color:var(--gold)">'+w.py+'</span> 芒聙聰 '+getCatLabel(w.cat)+'</div><div style="margin-top:6px;font-size:0.65rem;color:var(--wrong);opacity:0.7">芒聼碌 脴陋脵聟 脵聠脵聜脵聞 脴搂脵聞脵聝脵聞脵聟脴漏 脴楼脵聞脵聣 "脵聞脴搂 脴拢脴鹿脴卤脵聛"</div><div class="tts-row" style="margin-top:8px"><button class="tts-btn" onclick="speak(\''+w.zh+'\')">'+SVG_SPEAKER+' 脴搂脴鲁脴陋脵聟脴鹿</button></div><button class="quiz-next-btn" onclick="quizNext()">脴搂脵聞脴陋脴搂脵聞脵聤 芒聠聮</button></div>';setTimeout(()=>document.querySelector('.quiz-next-btn')?.focus(),50);}

function quizNext(){quizIndex++;renderQuizCard();}

function renderQuizSummary(){const a=document.getElementById('cardArea');const t=quizWords.length;const pct=t>0?Math.round((quizCorrect/t)*100):0;
let emoji='冒聼聨聣',msg='脵聟脵聟脴陋脴搂脴虏!';if(pct<30){emoji='冒聼聮陋';msg='脴搂脴鲁脴陋脵聟脴卤!';}else if(pct<60){emoji='冒聼聯職';msg='脴卢脵聤脴炉脴聦 脵聢脴搂脴碌脵聞!';}else if(pct<80){emoji='冒聼聭聫';msg='脴拢脴颅脴鲁脵聠脴陋!';}else if(pct<100){emoji='冒聼聦聼';msg='脴卤脴搂脴娄脴鹿!';}
document.getElementById('progressFill').style.width='100%';document.getElementById('progressText').textContent=t+' / '+t;
let mHTML='';if(quizMistakes.length>0){mHTML='<div class="quiz-mistakes-list"><div class="quiz-mistakes-title">脴陋脴颅脴陋脴搂脴卢 脵聟脴卤脴搂脴卢脴鹿脴漏 ('+quizMistakes.length+')</div>';quizMistakes.forEach(m=>{let err='';if(!m.zhOk)err+='<span style="color:var(--wrong);font-family:LXGW WenKai TC,sans-serif">'+m.userAnswer+'</span> ';if(!m.catOk&&m.userCat)err+='<span style="color:var(--wrong);font-size:0.65rem">'+getCatLabel(m.userCat)+'</span>';if(!err)err='(脴陋脴庐脴路脵聭脵聤)';mHTML+='<div class="quiz-mistake-item"><span class="mistake-zh">'+m.word.zh+'</span><span class="mistake-correct">'+m.word.py+' 脗路 '+getCatLabel(m.word.cat)+'</span><span class="mistake-yours">'+err+'</span></div>';});mHTML+='</div>';}
a.innerHTML='<div class="quiz-summary"><div class="quiz-summary-title">脵聠脴陋脵聤脴卢脴漏 脴搂脵聞脴搂脴庐脴陋脴篓脴搂脴卤</div><div class="quiz-summary-emoji">'+emoji+'</div><div class="quiz-score-display" style="color:'+(pct>=60?'var(--correct)':'var(--wrong)')+'">%'+pct+'</div><div class="quiz-score-label">'+msg+'</div><div class="quiz-summary-details"><div class="quiz-detail"><div class="quiz-detail-num" style="color:var(--correct)">'+quizCorrect+'</div><div class="quiz-detail-label">脴碌脴颅脵聤脴颅</div></div><div class="quiz-detail"><div class="quiz-detail-num" style="color:var(--wrong)">'+quizWrong+'</div><div class="quiz-detail-label">脴庐脴路脴拢</div></div><div class="quiz-detail"><div class="quiz-detail-num" style="color:var(--gold)">'+t+'</div><div class="quiz-detail-label">脴楼脴卢脵聟脴搂脵聞脵聤</div></div></div>'+mHTML+'<button class="quiz-restart-btn" onclick="startQuiz()">冒聼聰聞 脴楼脴鹿脴搂脴炉脴漏</button></div>';}

// Keyboard & Touch
document.addEventListener('keydown',e=>{if(currentMode==='quiz')return;if(e.target.tagName==='INPUT')return;if(e.key==='ArrowLeft')goNext();else if(e.key==='ArrowRight')goPrev();else if(e.key===' '){e.preventDefault();flipCard();}else if(e.key==='1')markKnown();else if(e.key==='2')markUnknown();});
let touchStartX=0;document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});document.addEventListener('touchend',e=>{if(currentMode==='quiz')return;const d=touchStartX-e.changedTouches[0].clientX;if(Math.abs(d)>60){if(d>0)goNext();else goPrev();}});

// Event Listeners
document.querySelectorAll('.fbtn').forEach(b=>{b.addEventListener('click',()=>setFilter(b.dataset.cat));});
document.getElementById('prevBtn').addEventListener('click',goPrev);
document.getElementById('nextBtn').addEventListener('click',goNext);
document.getElementById('knowBtn').addEventListener('click',markKnown);
document.getElementById('dontKnowBtn').addEventListener('click',markUnknown);
document.getElementById('shuffleBtn').addEventListener('click',shuffleCards);

// Init
buildTopicFilters();updateCounts();renderCard();updateProgress();

</script>
