<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بطاقات HSK4 التعليمية</title>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=LXGW+WenKai+TC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --ink-black: #1a1a1a; --ink-dark: #2c2318; --ink-medium: #5c4a3a; --ink-light: #8a7560;
  --parchment: #f5efe0; --parchment-deep: #e8dcc8; --parchment-light: #faf6ed;
  --vermillion: #c23a2b; --vermillion-soft: #d4574a;
  --gold: #b8943e; --gold-light: #d4b86a;
  --jade: #4a7c6f; --jade-light: #6a9e8e;
  --shadow-ink: rgba(44,35,24,0.12);
  --verb: var(--vermillion); --noun: #3a6fa0; --adj: var(--jade);
  --correct: var(--jade); --wrong: var(--vermillion);
  --accent: var(--gold); --accent-glow: rgba(184,148,62,0.25);
  --surface: var(--parchment-deep); --surface-2: #ddd3be;
  --text: var(--ink-dark); --text-dim: var(--ink-light);
  --card-front: var(--parchment-light); --card-back: var(--parchment-light);
  --radius: 6px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Naskh Arabic', 'Reem Kufi', serif;
  background: var(--parchment); color: var(--ink-dark);
  min-height: 100vh; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; opacity: 0.04; z-index: 0;
  background-image: radial-gradient(circle at 50% 50%, var(--ink-medium) 1px, transparent 1px);
  background-size: 20px 20px;
}
.header {
  position: relative; z-index: 10; padding: 40px 20px 20px; text-align: center;
  background: linear-gradient(180deg, var(--parchment-deep) 0%, var(--parchment) 100%);
}
.header::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background: linear-gradient(90deg, transparent, var(--vermillion), var(--gold), var(--vermillion), transparent); }
.header::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:80%; height:1px; background: linear-gradient(90deg, transparent, var(--ink-light), transparent); }
.header h1 {
  font-family: 'Reem Kufi', serif; font-size: 1.8rem; font-weight: 700;
  color: var(--ink-black); margin-bottom: 4px;
}
.header .subtitle { font-size: 0.85rem; color: var(--ink-medium); font-weight: 400; letter-spacing: 1px; }
.mode-switcher { position: relative; z-index: 10; display: flex; justify-content: center; padding: 12px 20px 16px; }
.mode-switcher-inner { display: flex; background: var(--parchment-deep); border-radius: 6px; padding: 4px; border: 1px solid rgba(0,0,0,0.06); box-shadow: 0 1px 4px var(--shadow-ink); }
.mode-btn {
  padding: 10px 24px; border: none; border-radius: 4px; background: transparent;
  color: var(--ink-light); font-family: 'Reem Kufi', serif; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 7px;
}
.mode-btn:hover { color: var(--ink-dark); }
.mode-btn.active { background: var(--vermillion); color: #fff; box-shadow: 0 2px 8px rgba(194,58,43,0.3); }
.mode-btn svg { width: 18px; height: 18px; }
.stats-bar { position: relative; z-index: 10; display: flex; justify-content: center; gap: 12px; padding: 0 20px 12px; flex-wrap: wrap; max-width: 460px; margin: 0 auto; }
.stat { background: var(--parchment-light); border: 1px solid rgba(0,0,0,0.05); border-radius: 6px; padding: 8px 14px; text-align: center; min-width: 70px; box-shadow: 0 1px 4px var(--shadow-ink); }
.stat-num { font-size: 1.3rem; font-weight: 700; color: var(--gold); font-family: sans-serif; }
.stat-label { font-size: 0.65rem; color: var(--ink-light); margin-top: 2px; }
.filters { position: relative; z-index: 10; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 8px 20px 16px; max-width: 460px; margin: 0 auto; }
.filter-btn {
  background: var(--parchment-light); border: 1px solid rgba(0,0,0,0.06); border-radius: 4px; padding: 8px 6px;
  color: var(--ink-medium); font-family: inherit; font-size: 0.78rem; font-weight: 600;
  cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 4px;
  box-shadow: 0 1px 3px var(--shadow-ink); white-space: nowrap;
}
.filter-btn:hover { border-color: var(--gold); color: var(--ink-dark); }
.filter-btn.active { background: var(--gold); color: #fff; border-color: var(--gold); }
.filter-btn[data-cat="verb"].active { background: var(--vermillion); border-color: var(--vermillion); }
.filter-btn[data-cat="noun"].active { background: var(--noun); border-color: var(--noun); }
.filter-btn[data-cat="adj"].active { background: var(--jade); border-color: var(--jade); }
.filter-btn .count { opacity: 0.7; font-weight: 400; }
.category-filters { position: relative; z-index: 10; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 0 20px 12px; max-width: 460px; margin: 0 auto; }
.cat-btn { background: transparent; border: 1.5px solid rgba(0,0,0,0.1); border-radius: 4px; padding: 6px 4px; font-family: inherit; font-size: 0.7rem; font-weight: 600; cursor: pointer; transition: all 0.3s; color: var(--ink-light); text-align: center; white-space: nowrap; }
.cat-btn:hover { border-color: var(--gold); color: var(--ink-dark); }
.cat-btn.active { background: rgba(184,148,62,0.1); border-color: var(--gold); color: var(--gold); }
.progress-wrap { position: relative; z-index: 10; padding: 0 24px 16px; max-width: 460px; margin: 0 auto; }
.progress-bar { height: 3px; background: var(--parchment-deep); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--vermillion), var(--gold)); border-radius: 2px; transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1); width: 0%; }
.progress-text { text-align: center; font-size: 0.7rem; color: var(--ink-light); margin-top: 6px; }
.card-area { position: relative; z-index: 10; display: flex; justify-content: center; align-items: flex-start; padding: 0 20px; min-height: 340px; max-width: 460px; margin: 0 auto; }
.card-container { perspective: 1200px; width: 100%; max-width: 420px; }
.card { position: relative; width: 100%; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; }
.card.flipped { transform: rotateY(180deg); }
.card-face { backface-visibility: hidden; border-radius: var(--radius); padding: 28px 20px; display: flex; flex-direction: column; border: 1px solid rgba(0,0,0,0.06); box-shadow: 0 2px 12px var(--shadow-ink); position: relative; border-right: 4px solid; border-image: linear-gradient(180deg, var(--vermillion), var(--gold)) 1; }
.card-front { position: relative; background: var(--parchment-light); justify-content: center; align-items: center; text-align: center; min-height: 300px; padding-top: 44px; padding-bottom: 36px; }
.card-back { position: absolute; top: 0; left: 0; width: 100%; min-height: 100%; background: var(--parchment-light); transform: rotateY(180deg); direction: rtl; overflow: hidden; }
.card-cat-badge { position: absolute; top: 16px; right: 20px; padding: 3px 12px; border-radius: 3px; font-size: 0.65rem; font-weight: 700; }
.card-cat-badge.verb { background: var(--vermillion); color: #fff; }
.card-cat-badge.noun { background: var(--noun); color: #fff; }
.card-cat-badge.adj { background: var(--jade); color: #fff; }
.card-topic-badge { position: absolute; top: 16px; left: 16px; padding: 3px 10px; border-radius: 3px; font-size: 0.6rem; font-weight: 500; background: rgba(0,0,0,0.04); color: var(--ink-light); border: 1px solid rgba(0,0,0,0.06); }
.card-number { font-size: 0.7rem; color: var(--ink-light); margin-top: 12px; }
.chinese-char { font-family: 'LXGW WenKai TC', 'Noto Sans SC', sans-serif; font-size: 4rem; font-weight: 700; color: var(--ink-black); margin-bottom: 6px; line-height: 1.2; }
.pinyin { font-size: 1.1rem; color: var(--gold); font-weight: 400; margin-bottom: 4px; font-style: italic; }
.arabic-meaning { font-size: 1rem; color: var(--ink-dark); font-weight: 600; margin-bottom: 4px; }
.back-section { margin-bottom: 16px; }
.back-label { font-size: 0.65rem; color: var(--vermillion); font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; }
.back-chinese { font-family: 'LXGW WenKai TC', 'Noto Sans SC', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--ink-black); direction: ltr; text-align: left; margin-bottom: 2px; }
.back-pinyin-line { font-size: 0.85rem; color: var(--gold); font-style: italic; direction: ltr; text-align: left; margin-bottom: 6px; }
.back-arabic { font-size: 0.95rem; color: var(--ink-dark); line-height: 1.5; }
.sentence-box { background: rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.06); border-radius: 6px; padding: 14px; border-right: 3px solid var(--gold-light); }
.sentence-chinese { font-family: 'LXGW WenKai TC', 'Noto Sans SC', sans-serif; font-size: 1.1rem; font-weight: 500; color: var(--ink-black); direction: ltr; text-align: left; line-height: 1.6; margin-bottom: 4px; }
.sentence-pinyin { font-size: 0.75rem; color: var(--gold); font-style: italic; direction: ltr; text-align: left; margin-bottom: 6px; opacity: 0.8; }
.sentence-arabic { font-size: 0.85rem; color: var(--ink-medium); line-height: 1.5; }
.tts-row { display: flex; gap: 8px; margin-top: 8px; direction: ltr; justify-content: center; flex-wrap: wrap; }
.tts-btn { background: var(--vermillion); border: none; border-radius: 4px; padding: 8px 16px; color: #fff; font-family: inherit; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
.tts-btn:hover { transform: scale(1.05); background: var(--vermillion-soft); }
.tts-btn:active { transform: scale(0.95); }
.tts-btn svg { width: 14px; height: 14px; }
.nav-area { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; gap: 12px; padding: 16px 20px; max-width: 460px; margin: 0 auto; }
.nav-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--parchment-light); border: 1px solid rgba(0,0,0,0.08); color: var(--ink-dark); font-size: 1.1rem; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 4px var(--shadow-ink); flex-shrink: 0; }
.nav-btn:hover { border-color: var(--gold); background: var(--parchment-deep); }
.know-btn, .dont-know-btn { padding: 10px 16px; border-radius: 4px; border: none; font-family: inherit; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.2s; flex: 1; max-width: 130px; text-align: center; }
.know-btn { background: var(--jade); color: #fff; }
.dont-know-btn { background: var(--vermillion); color: #fff; }
.know-btn:hover, .dont-know-btn:hover { transform: scale(1.05); }
.shuffle-btn { position: relative; z-index: 10; display: block; margin: 0 auto 24px; background: transparent; border: 1px solid rgba(0,0,0,0.1); border-radius: 4px; padding: 8px 20px; color: var(--ink-light); font-family: inherit; font-size: 0.75rem; cursor: pointer; transition: all 0.3s; max-width: 460px; }
.shuffle-btn:hover { border-color: var(--gold); color: var(--gold); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--ink-light); }
.empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
.card-enter { animation: cardEnter 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
@keyframes cardEnter { from { opacity: 0; transform: scale(0.95) translateY(16px); } to { opacity: 1; transform: scale(1) translateY(0); } }

/* QUIZ */
.quiz-card { width: 100%; max-width: 420px; background: var(--parchment-light); border-radius: var(--radius); border: 1px solid rgba(0,0,0,0.06); border-right: 4px solid; border-image: linear-gradient(180deg, var(--vermillion), var(--gold)) 1; padding: 32px 20px; text-align: center; box-shadow: 0 2px 12px var(--shadow-ink); position: relative; }
.quiz-card.card-enter { animation: cardEnter 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
.quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.quiz-score-badge { padding: 5px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.06); color: var(--ink-medium); direction: ltr; }
.quiz-score-badge .correct-num { color: var(--jade); }
.quiz-score-badge .wrong-num { color: var(--vermillion); }
.quiz-chinese { font-family: 'LXGW WenKai TC', 'Noto Sans SC', sans-serif; font-size: 5rem; font-weight: 700; color: var(--ink-black); margin: 16px 0; line-height: 1.2; }
.quiz-arabic-hint { font-size: 0.9rem; color: var(--ink-medium); margin-bottom: 24px; font-weight: 500; }
.quiz-input-wrap { position: relative; margin: 0 auto 16px; max-width: 300px; direction: ltr; }
.quiz-input { width: 100%; padding: 14px 20px; border-radius: 6px; border: 2px solid rgba(0,0,0,0.1); background: #fff; color: var(--ink-dark); font-family: inherit; font-size: 1.2rem; text-align: center; outline: none; transition: all 0.3s; letter-spacing: 1px; }
.quiz-input::placeholder { color: var(--ink-light); font-size: 0.85rem; letter-spacing: 0; }
.quiz-input:focus { border-color: var(--gold); box-shadow: 0 0 12px var(--accent-glow); }
.quiz-input.correct { border-color: var(--jade); box-shadow: 0 0 12px rgba(74,124,111,0.3); background: rgba(74,124,111,0.06); }
.quiz-input.wrong { border-color: var(--vermillion); box-shadow: 0 0 12px rgba(194,58,43,0.2); background: rgba(194,58,43,0.04); }
.quiz-submit-btn { padding: 12px 40px; border-radius: 4px; border: none; background: var(--vermillion); color: #fff; font-family: inherit; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-bottom: 8px; }
.quiz-submit-btn:hover { transform: scale(1.05); box-shadow: 0 3px 12px rgba(194,58,43,0.3); }
.quiz-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.quiz-skip-btn { display: block; margin: 8px auto 0; padding: 8px 20px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); background: transparent; color: var(--ink-light); font-family: inherit; font-size: 0.75rem; cursor: pointer; transition: all 0.3s; }
.quiz-skip-btn:hover { border-color: var(--gold); color: var(--gold); }
.quiz-feedback { margin-top: 16px; padding: 16px; border-radius: 6px; animation: feedbackIn 0.4s ease; }
@keyframes feedbackIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.quiz-feedback.correct-fb { background: rgba(74,124,111,0.08); border: 1px solid rgba(74,124,111,0.2); border-right: 3px solid var(--jade); }
.quiz-feedback.wrong-fb { background: rgba(194,58,43,0.06); border: 1px solid rgba(194,58,43,0.15); border-right: 3px solid var(--vermillion); }
.quiz-fb-icon { font-size: 2rem; margin-bottom: 8px; }
.quiz-fb-text { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
.quiz-fb-answer { font-size: 1.1rem; font-weight: 700; direction: ltr; margin-top: 4px; }
.quiz-fb-answer .correct-answer { color: var(--jade); }
.quiz-next-btn { margin-top: 14px; padding: 10px 30px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.08); background: var(--parchment-deep); color: var(--ink-dark); font-family: inherit; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.quiz-next-btn:hover { border-color: var(--gold); }
.quiz-summary { width: 100%; max-width: 420px; text-align: center; padding: 40px 24px; animation: feedbackIn 0.5s ease; }
.quiz-summary-title { font-family: 'Reem Kufi', serif; font-size: 1.4rem; font-weight: 700; color: var(--ink-black); margin-bottom: 8px; }
.quiz-summary-emoji { font-size: 4rem; margin: 16px 0; }
.quiz-score-display { font-size: 3.5rem; font-weight: 900; margin: 12px 0 4px; font-family: sans-serif; }
.quiz-score-label { font-size: 0.85rem; color: var(--ink-medium); margin-bottom: 20px; }
.quiz-summary-details { display: flex; justify-content: center; gap: 24px; margin-bottom: 24px; }
.quiz-detail { text-align: center; }
.quiz-detail-num { font-size: 1.8rem; font-weight: 800; font-family: sans-serif; }
.quiz-detail-label { font-size: 0.7rem; color: var(--ink-light); }
.quiz-mistakes-list { text-align: right; margin-top: 20px; background: var(--parchment-light); border-radius: 6px; padding: 16px; border: 1px solid rgba(0,0,0,0.06); box-shadow: 0 1px 6px var(--shadow-ink); max-height: 250px; overflow-y: auto; }
.quiz-mistakes-title { font-size: 0.75rem; color: var(--vermillion); font-weight: 700; margin-bottom: 10px; text-align: center; }
.quiz-mistake-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.04); direction: ltr; }
.quiz-mistake-item:last-child { border-bottom: none; }
.mistake-zh { font-family: 'LXGW WenKai TC', 'Noto Sans SC', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--ink-black); }
.mistake-correct { font-size: 0.85rem; color: var(--jade); font-weight: 600; }
.mistake-yours { font-size: 0.8rem; color: var(--vermillion); text-decoration: line-through; opacity: 0.7; }
.quiz-restart-btn { margin-top: 20px; padding: 14px 40px; border-radius: 4px; border: none; background: var(--vermillion); color: #fff; font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.quiz-restart-btn:hover { transform: scale(1.05); }
@keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-6px); } 80% { transform: translateX(6px); } }
.shake { animation: shake 0.4s ease; }
.hidden { display: none !important; }
@media (max-width: 420px) { .chinese-char, .quiz-chinese { font-size: 3.2rem; } .card-face { padding: 20px 16px; } .card-front { min-height: 280px; padding-top: 36px; } .quiz-card { padding: 24px 16px; } .category-filters { grid-template-columns: repeat(3, 1fr); } .nav-area { gap: 8px; padding: 12px 16px; } .know-btn, .dont-know-btn { padding: 10px 10px; font-size: 0.75rem; } .arabic-meaning { font-size: 1rem; } .pinyin { font-size: 1rem; } }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--parchment-deep); }
::-webkit-scrollbar-thumb { background: var(--ink-light); border-radius: 4px; }
</style>
</head>
<body>
<div class="header">
  <h1>بطاقات HSK4 التعليمية</h1>
  <div class="subtitle">أفعال · أسماء · صفات — مع النطق والجمل والاختبار</div>
</div>
<div class="mode-switcher">
  <div class="mode-switcher-inner">
    <button class="mode-btn active" id="modeCards" onclick="setMode('cards')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="3"/><line x1="2" y1="9" x2="22" y2="9"/></svg>
      بطاقات
    </button>
    <button class="mode-btn" id="modeQuiz" onclick="setMode('quiz')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5"/></svg>
      اختبار كتابة 汉字
    </button>
  </div>
</div>
<div class="stats-bar" id="statsBar">
  <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">إجمالي</div></div>
  <div class="stat"><div class="stat-num" id="knownCount" style="color:var(--adj)">0</div><div class="stat-label">أعرفها</div></div>
  <div class="stat"><div class="stat-num" id="unknownCount" style="color:var(--verb)">0</div><div class="stat-label">أراجعها</div></div>
</div>
<div class="stats-bar hidden" id="quizStatsBar">
  <div class="stat"><div class="stat-num" id="quizTotal">0</div><div class="stat-label">أسئلة</div></div>
  <div class="stat"><div class="stat-num" id="quizCorrectStat" style="color:var(--correct)">0</div><div class="stat-label">صحيح</div></div>
  <div class="stat"><div class="stat-num" id="quizWrongStat" style="color:var(--wrong)">0</div><div class="stat-label">خطأ</div></div>
</div>
<div class="filters">
  <button class="filter-btn active" data-cat="all">الكل <span class="count" id="countAll"></span></button>
  <button class="filter-btn" data-cat="verb">أفعال <span class="count" id="countVerb"></span></button>
  <button class="filter-btn" data-cat="noun">أسماء <span class="count" id="countNoun"></span></button>
  <button class="filter-btn" data-cat="adj">صفات <span class="count" id="countAdj"></span></button>
</div>
<div class="category-filters" id="topicFilters"></div>
<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">0 / 0</div>
</div>
<div class="card-area" id="cardArea"></div>
<div class="nav-area" id="navArea">
  <button class="dont-know-btn" id="dontKnowBtn">✗ لا أعرف</button>
  <button class="nav-btn" id="prevBtn">→</button>
  <button class="nav-btn" id="nextBtn">←</button>
  <button class="know-btn" id="knowBtn">✓ أعرف</button>
</div>
<button class="shuffle-btn" id="shuffleBtn">🔀 خلط البطاقات</button>

if(pct<30){emoji='💪';msg='استمر في التدريب!';}else if(pct<60){emoji='📚';msg='جيد، واصل المراجعة!';}else if(pct<80){emoji='👏';msg='أحسنت! قريب من الإتقان!';}else if(pct<100){emoji='🌟';msg='رائع جداً!';}
document.getElementById('progressFill').style.width='100%';document.getElementById('progressText').textContent=t+' / '+t;
let mHTML='';if(quizMistakes.length>0){mHTML='<div class="quiz-mistakes-list"><div class="quiz-mistakes-title">الكلمات التي تحتاج مراجعة ('+quizMistakes.length+')</div>';quizMistakes.forEach(m=>{let err='';if(!m.zhOk)err+='<span style="color:var(--wrong);font-family:LXGW WenKai TC,Noto Sans SC,sans-serif">'+m.userAnswer+'</span> ';if(!m.catOk&&m.userCat)err+='<span style="color:var(--wrong);font-size:0.7rem">'+getCatLabel(m.userCat)+'</span>';if(!err)err='(تخطّي)';mHTML+='<div class="quiz-mistake-item"><span class="mistake-zh">'+m.word.zh+'</span><span class="mistake-correct">'+m.word.py+' · '+getCatLabel(m.word.cat)+'</span><span class="mistake-yours">'+err+'</span></div>';});mHTML+='</div>';}
a.innerHTML='<div class="quiz-summary"><div class="quiz-summary-title">نتيجة الاختبار</div><div class="quiz-summary-emoji">'+emoji+'</div><div class="quiz-score-display" style="color:'+(pct>=60?'var(--correct)':'var(--wrong)')+'">%'+pct+'</div><div class="quiz-score-label">'+msg+'</div><div class="quiz-summary-details"><div class="quiz-detail"><div class="quiz-detail-num" style="color:var(--correct)">'+quizCorrect+'</div><div class="quiz-detail-label">صحيح</div></div><div class="quiz-detail"><div class="quiz-detail-num" style="color:var(--wrong)">'+quizWrong+'</div><div class="quiz-detail-label">خطأ</div></div><div class="quiz-detail"><div class="quiz-detail-num" style="color:var(--accent)">'+t+'</div><div class="quiz-detail-label">إجمالي</div></div></div>'+mHTML+'<button class="quiz-restart-btn" onclick="startQuiz()">🔄 إعادة الاختبار</button></div>';}

// Keyboard & Touch
document.addEventListener('keydown',e=>{if(currentMode==='quiz')return;if(e.target.tagName==='INPUT')return;if(e.key==='ArrowLeft')goNext();else if(e.key==='ArrowRight')goPrev();else if(e.key===' '){e.preventDefault();flipCard();}else if(e.key==='1')markKnown();else if(e.key==='2')markUnknown();});
let touchStartX=0;document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;});document.addEventListener('touchend',e=>{if(currentMode==='quiz')return;const d=touchStartX-e.changedTouches[0].clientX;if(Math.abs(d)>60){if(d>0)goNext();else goPrev();}});

// Event Listeners
document.querySelectorAll('.filter-btn').forEach(b=>{b.addEventListener('click',()=>setFilter(b.dataset.cat));});
document.getElementById('prevBtn').addEventListener('click',goPrev);
document.getElementById('nextBtn').addEventListener('click',goNext);
document.getElementById('knowBtn').addEventListener('click',markKnown);
document.getElementById('dontKnowBtn').addEventListener('click',markUnknown);
document.getElementById('shuffleBtn').addEventListener('click',shuffleCards);

// Init
buildTopicFilters();updateCounts();renderCard();updateProgress();
</script>
</body>
</html>
