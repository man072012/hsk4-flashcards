<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بطاقات HSK4 التعليمية</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #14141f;
  --surface-2: #1e1e2e;
  --accent: #f59e0b;
  --accent-glow: #f59e0b44;
  --verb: #ef4444;
  --noun: #3b82f6;
  --adj: #10b981;
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --card-front: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  --card-back: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
  --radius: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans Arabic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Ambient background */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 30% 20%, #f59e0b08 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, #3b82f608 0%, transparent 50%);
  animation: ambientDrift 20s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 0;
}

@keyframes ambientDrift {
  0% { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(-3%, 3%) rotate(2deg); }
}

/* Header */
.header {
  position: relative;
  z-index: 10;
  padding: 24px 20px 16px;
  text-align: center;
}

.header h1 {
  font-size: 1.8rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), #fbbf24, #f97316);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
  letter-spacing: -0.5px;
}

.header .subtitle {
  font-size: 0.85rem;
  color: var(--text-dim);
  font-weight: 300;
}

/* Stats bar */
.stats-bar {
  position: relative;
  z-index: 10;
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 0 20px 12px;
  flex-wrap: wrap;
}

.stat {
  background: var(--surface);
  border: 1px solid #ffffff0a;
  border-radius: 12px;
  padding: 8px 14px;
  text-align: center;
  min-width: 70px;
}

.stat-num {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--accent);
}

.stat-label {
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-top: 2px;
}

/* Filter tabs */
.filters {
  position: relative;
  z-index: 10;
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 8px 20px 16px;
  flex-wrap: wrap;
}

.filter-btn {
  background: var(--surface);
  border: 1px solid #ffffff0a;
  border-radius: 30px;
  padding: 8px 18px;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
.filter-btn .count { opacity: 0.7; font-weight: 400; }

.filter-btn[data-cat="verb"] { --cat-color: var(--verb); }
.filter-btn[data-cat="noun"] { --cat-color: var(--noun); }
.filter-btn[data-cat="adj"] { --cat-color: var(--adj); }
.filter-btn[data-cat="verb"].active { background: var(--verb); }
.filter-btn[data-cat="noun"].active { background: var(--noun); }
.filter-btn[data-cat="adj"].active { background: var(--adj); }

/* Category filter row */
.category-filters {
  position: relative;
  z-index: 10;
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 0 20px 12px;
  flex-wrap: wrap;
}

.cat-btn {
  background: transparent;
  border: 1.5px solid;
  border-radius: 20px;
  padding: 5px 14px;
  font-family: inherit;
  font-size: 0.72rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}

.cat-btn[data-topic] { border-color: #ffffff15; color: var(--text-dim); }
.cat-btn[data-topic]:hover { border-color: var(--accent); color: var(--text); }
.cat-btn[data-topic].active { background: var(--surface-2); border-color: var(--accent); color: var(--accent); }

/* Progress bar */
.progress-wrap {
  position: relative;
  z-index: 10;
  padding: 0 24px 16px;
}

.progress-bar {
  height: 4px;
  background: var(--surface-2);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #f97316);
  border-radius: 4px;
  transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  width: 0%;
}

.progress-text {
  text-align: center;
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 6px;
}

/* Card area */
.card-area {
  position: relative;
  z-index: 10;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 0 20px;
  min-height: 360px;
}

.card-container {
  perspective: 1200px;
  width: 100%;
  max-width: 400px;
}

.card {
  position: relative;
  width: 100%;
  min-height: 340px;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  cursor: pointer;
}

.card.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  min-height: 340px;
  backface-visibility: hidden;
  border-radius: var(--radius);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  border: 1px solid #ffffff08;
}

.card-front {
  background: var(--card-front);
  justify-content: center;
  align-items: center;
  text-align: center;
}

.card-back {
  background: var(--card-back);
  transform: rotateY(180deg);
  direction: rtl;
}

/* Card front content */
.card-cat-badge {
  position: absolute;
  top: 16px;
  right: 16px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.card-cat-badge.verb { background: var(--verb); color: #fff; }
.card-cat-badge.noun { background: var(--noun); color: #fff; }
.card-cat-badge.adj { background: var(--adj); color: #fff; }

.card-topic-badge {
  position: absolute;
  top: 16px;
  left: 16px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 0.6rem;
  font-weight: 500;
  background: #ffffff0a;
  color: var(--text-dim);
  border: 1px solid #ffffff08;
}

.card-number {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.7rem;
  color: var(--text-dim);
}

.chinese-char {
  font-family: 'Ma Shan Zheng', 'Noto Sans SC', sans-serif;
  font-size: 4.5rem;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 40px var(--accent-glow);
  margin-bottom: 12px;
  line-height: 1.1;
}

.pinyin {
  font-size: 1.2rem;
  color: var(--accent);
  font-weight: 400;
  margin-bottom: 8px;
  font-style: italic;
}

.arabic-meaning {
  font-size: 1.1rem;
  color: var(--text);
  font-weight: 600;
}

.tap-hint {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.65rem;
  color: var(--text-dim);
  opacity: 0.5;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}

/* Card back content */
.back-section {
  margin-bottom: 16px;
}

.back-section:last-child { margin-bottom: 0; }

.back-label {
  font-size: 0.65rem;
  color: var(--accent);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.back-chinese {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: #fff;
  direction: ltr;
  text-align: left;
  margin-bottom: 2px;
}

.back-pinyin-line {
  font-size: 0.85rem;
  color: var(--accent);
  font-style: italic;
  direction: ltr;
  text-align: left;
  margin-bottom: 6px;
}

.back-arabic {
  font-size: 0.95rem;
  color: var(--text);
  line-height: 1.5;
}

.sentence-box {
  background: #ffffff06;
  border: 1px solid #ffffff0a;
  border-radius: 12px;
  padding: 14px;
}

.sentence-chinese {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 1.1rem;
  font-weight: 500;
  color: #fff;
  direction: ltr;
  text-align: left;
  line-height: 1.6;
  margin-bottom: 4px;
}

.sentence-pinyin {
  font-size: 0.75rem;
  color: var(--accent);
  font-style: italic;
  direction: ltr;
  text-align: left;
  margin-bottom: 6px;
  opacity: 0.8;
}

.sentence-arabic {
  font-size: 0.85rem;
  color: var(--text-dim);
  line-height: 1.5;
}

/* TTS Buttons */
.tts-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  direction: ltr;
}

.tts-btn {
  background: var(--accent);
  border: none;
  border-radius: 10px;
  padding: 8px 14px;
  color: #000;
  font-family: inherit;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
}

.tts-btn:hover { transform: scale(1.05); }
.tts-btn:active { transform: scale(0.95); }
.tts-btn.playing { background: #f97316; }

.tts-btn svg {
  width: 14px;
  height: 14px;
}

/* Navigation */
.nav-area {
  position: relative;
  z-index: 10;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  padding: 20px;
}

.nav-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid #ffffff0a;
  color: var(--text);
  font-size: 1.3rem;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-btn:hover { background: var(--surface-2); border-color: var(--accent); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.know-btn, .dont-know-btn {
  padding: 12px 24px;
  border-radius: 14px;
  border: none;
  font-family: inherit;
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.know-btn {
  background: var(--adj);
  color: #fff;
}

.dont-know-btn {
  background: var(--verb);
  color: #fff;
}

.know-btn:hover, .dont-know-btn:hover { transform: scale(1.05); }

/* Shuffle button */
.shuffle-btn {
  position: relative;
  z-index: 10;
  display: block;
  margin: 0 auto 24px;
  background: transparent;
  border: 1px solid #ffffff15;
  border-radius: 30px;
  padding: 8px 20px;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.3s;
}

.shuffle-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}

.empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.9rem; }

/* Animations */
.card-enter {
  animation: cardEnter 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}

@keyframes cardEnter {
  from { opacity: 0; transform: scale(0.9) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

/* Responsive */
@media (max-width: 420px) {
  .chinese-char { font-size: 3.5rem; }
  .card-face { padding: 24px 18px; min-height: 310px; }
  .card { min-height: 310px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 4px; }

/* Review Summary */
.review-summary {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 40px 20px;
}

.review-summary h2 {
  font-size: 1.5rem;
  color: var(--accent);
  margin-bottom: 8px;
}

.review-summary .score {
  font-size: 3rem;
  font-weight: 800;
  color: var(--text);
  margin: 16px 0;
}

.review-summary .restart-btn {
  background: var(--accent);
  border: none;
  border-radius: 14px;
  padding: 12px 32px;
  color: #000;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 16px;
}
</style>
</head>
<body>

<div class="header">
  <h1>بطاقات HSK4 التعليمية</h1>
  <div class="subtitle">أفعال · أسماء · صفات — مع النطق والجمل</div>
</div>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-num" id="totalCount">0</div>
    <div class="stat-label">إجمالي</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="knownCount" style="color: var(--adj)">0</div>
    <div class="stat-label">أعرفها</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="unknownCount" style="color: var(--verb)">0</div>
    <div class="stat-label">أراجعها</div>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" data-cat="all">الكل <span class="count" id="countAll"></span></button>
  <button class="filter-btn" data-cat="verb">أفعال <span class="count" id="countVerb"></span></button>
  <button class="filter-btn" data-cat="noun">أسماء <span class="count" id="countNoun"></span></button>
  <button class="filter-btn" data-cat="adj">صفات <span class="count" id="countAdj"></span></button>
</div>

<div class="category-filters" id="topicFilters"></div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">0 / 0</div>
</div>

<div class="card-area" id="cardArea">
  <!-- Card rendered by JS -->
</div>

<div class="nav-area" id="navArea">
  <button class="dont-know-btn" id="dontKnowBtn" title="لا أعرفها">✗ لا أعرف</button>
  <button class="nav-btn" id="prevBtn" title="السابقة">→</button>
  <button class="nav-btn" id="nextBtn" title="التالية">←</button>
  <button class="know-btn" id="knowBtn" title="أعرفها">✓ أعرف</button>
</div>

<button class="shuffle-btn" id="shuffleBtn">🔀 خلط البطاقات</button>

<script>
// ============================================================
// VOCABULARY DATA
// ============================================================
const words = [
  // ===== أفعال (Verbs) =====
  // المشاعر والتصرفات
  { zh: "尝", py: "cháng", ar: "يُجرّب / يتذوّق", cat: "verb", topic: "التصرفات",
    sentence: { zh: "你尝一下这个菜，味道很好。", py: "Nǐ cháng yíxià zhège cài, wèidào hěn hǎo.", ar: "جرّب هذا الطبق، طعمه لذيذ جداً." }},
  { zh: "讨论", py: "tǎolùn", ar: "يُناقش", cat: "verb", topic: "التصرفات",
    sentence: { zh: "我们一起讨论这个问题吧。", py: "Wǒmen yìqǐ tǎolùn zhège wèntí ba.", ar: "لنناقش هذه المشكلة معاً." }},
  { zh: "商量", py: "shāngliáng", ar: "يتشاور", cat: "verb", topic: "التصرفات",
    sentence: { zh: "这件事我们商量一下再决定。", py: "Zhè jiàn shì wǒmen shāngliáng yíxià zài juédìng.", ar: "لنتشاور حول هذا الأمر قبل أن نقرر." }},
  { zh: "猜", py: "cāi", ar: "يُخمّن", cat: "verb", topic: "التصرفات",
    sentence: { zh: "你猜猜这个东西多少钱？", py: "Nǐ cāi cāi zhège dōngxi duōshao qián?", ar: "خمّن كم سعر هذا الشيء؟" }},
  { zh: "收拾", py: "shōushi", ar: "يُرتّب / يُنظّف", cat: "verb", topic: "التصرفات",
    sentence: { zh: "请你收拾一下房间。", py: "Qǐng nǐ shōushi yíxià fángjiān.", ar: "رجاءً رتّب الغرفة." }},
  { zh: "整理", py: "zhěnglǐ", ar: "يُرتّب / يُنظّم", cat: "verb", topic: "التصرفات",
    sentence: { zh: "我需要整理一下我的东西。", py: "Wǒ xūyào zhěnglǐ yíxià wǒ de dōngxi.", ar: "أحتاج أن أرتّب أغراضي." }},
  { zh: "修", py: "xiū", ar: "يُصلح / يُصوّن", cat: "verb", topic: "التصرفات",
    sentence: { zh: "这个手机坏了，需要修一修。", py: "Zhège shǒujī huài le, xūyào xiū yì xiū.", ar: "هذا الهاتف خربان، يحتاج إصلاح." }},
  { zh: "弹", py: "tán", ar: "يعزف على آلة موسيقية", cat: "verb", topic: "التصرفات",
    sentence: { zh: "她会弹钢琴，弹得很好。", py: "Tā huì tán gāngqín, tán de hěn hǎo.", ar: "هي تعرف تعزف بيانو، وتعزف بشكل ممتاز." }},
  { zh: "打扮", py: "dǎbàn", ar: "يتزيّن / يتأنّق", cat: "verb", topic: "التصرفات",
    sentence: { zh: "她今天打扮得很漂亮。", py: "Tā jīntiān dǎbàn de hěn piàoliang.", ar: "هي اليوم تزيّنت بشكل جميل جداً." }},
  { zh: "脱", py: "tuō", ar: "يخلع (ملابس)", cat: "verb", topic: "التصرفات",
    sentence: { zh: "进门以前请脱鞋。", py: "Jìn mén yǐqián qǐng tuō xié.", ar: "قبل الدخول رجاءً اخلع حذاءك." }},
  { zh: "抱", py: "bào", ar: "يُعانق / يحمل", cat: "verb", topic: "التصرفات",
    sentence: { zh: "妈妈抱着孩子走了。", py: "Māma bào zhe háizi zǒu le.", ar: "الأم حملت الطفل ومشت." }},
  { zh: "敲", py: "qiāo", ar: "يطرق", cat: "verb", topic: "التصرفات",
    sentence: { zh: "有人在敲门，你去开门吧。", py: "Yǒu rén zài qiāo mén, nǐ qù kāi mén ba.", ar: "أحد يطرق الباب، اذهب وافتح." }},
  { zh: "寄", py: "jì", ar: "يُرسل (بريد)", cat: "verb", topic: "التصرفات",
    sentence: { zh: "我想寄一封信给朋友。", py: "Wǒ xiǎng jì yì fēng xìn gěi péngyou.", ar: "أريد أن أرسل رسالة لصديقي." }},
  { zh: "咳嗽", py: "késou", ar: "يسعل", cat: "verb", topic: "الصحة",
    sentence: { zh: "我感冒了，一直咳嗽。", py: "Wǒ gǎnmào le, yìzhí késou.", ar: "أصبت بزكام، وأسعل باستمرار." }},
  { zh: "减肥", py: "jiǎnféi", ar: "يفقد وزناً", cat: "verb", topic: "الصحة",
    sentence: { zh: "他每天跑步是为了减肥。", py: "Tā měitiān pǎobù shì wèile jiǎnféi.", ar: "هو يركض كل يوم من أجل تخفيف الوزن." }},
  { zh: "醒", py: "xǐng", ar: "يستيقظ", cat: "verb", topic: "الصحة",

  try {
    localStorage.setItem('hsk4_known', JSON.stringify([...known]));
    localStorage.setItem('hsk4_unknown', JSON.stringify([...unknown]));
  } catch(e) {}
}

// ============================================================
// TTS using Microsoft Speech API
// ============================================================
function speak(text, lang = 'zh-CN') {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = lang;
    utterance.rate = 0.85;
    utterance.pitch = 1;

    // Try to find Microsoft or Chinese voice
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v => 
      v.lang.startsWith('zh') && (v.name.includes('Microsoft') || v.name.includes('Huihui') || v.name.includes('Xiaoxiao') || v.name.includes('Google'))
    ) || voices.find(v => v.lang.startsWith('zh'));
    
    if (preferred) utterance.voice = preferred;
    window.speechSynthesis.speak(utterance);
  }
}

// Load voices
if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

// ============================================================
// TOPICS
// ============================================================
function getTopics() {
  const topics = new Set();
  words.forEach(w => topics.add(w.topic));
  return [...topics];
}

function buildTopicFilters() {
  const container = document.getElementById('topicFilters');
  const topics = getTopics();
  let html = `<button class="cat-btn active" data-topic="all" onclick="setTopic('all')">كل المواضيع</button>`;
  topics.forEach(t => {
    html += `<button class="cat-btn" data-topic="${t}" onclick="setTopic('${t}')">${t}</button>`;
  });
  container.innerHTML = html;
}

function setTopic(topic) {
  currentTopic = topic;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.cat-btn[data-topic="${topic}"]`).classList.add('active');
  applyFilters();
}

// ============================================================
// FILTERING
// ============================================================
function applyFilters() {
  filteredWords = words.filter(w => {
    const catMatch = currentFilter === 'all' || w.cat === currentFilter;
    const topicMatch = currentTopic === 'all' || w.topic === currentTopic;
    return catMatch && topicMatch;
  });
  currentIndex = 0;
  isFlipped = false;
  updateCounts();
  renderCard();
  updateProgress();
}

function setFilter(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.filter-btn[data-cat="${cat}"]`).classList.add('active');
  applyFilters();
}

// ============================================================
// COUNTS
// ============================================================
function updateCounts() {
  document.getElementById('countAll').textContent = `(${words.length})`;
  document.getElementById('countVerb').textContent = `(${words.filter(w=>w.cat==='verb').length})`;
  document.getElementById('countNoun').textContent = `(${words.filter(w=>w.cat==='noun').length})`;
  document.getElementById('countAdj').textContent = `(${words.filter(w=>w.cat==='adj').length})`;
  document.getElementById('totalCount').textContent = filteredWords.length;
  document.getElementById('knownCount').textContent = known.size;
  document.getElementById('unknownCount').textContent = unknown.size;
}

// ============================================================
// CARD RENDERING
// ============================================================
function getCatLabel(cat) {
  return { verb: 'فعل', noun: 'اسم', adj: 'صفة' }[cat] || cat;
}

function renderCard() {
  const area = document.getElementById('cardArea');
  
  if (filteredWords.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="emoji">📭</div><p>لا توجد بطاقات لهذا التصنيف</p></div>`;
    return;
  }
  
  const w = filteredWords[currentIndex];
  const wordId = w.zh;
  const isKnown = known.has(wordId);
  const isUnknown = unknown.has(wordId);
  
  area.innerHTML = `
    <div class="card-container">
      <div class="card card-enter" id="theCard" onclick="flipCard()">
        <div class="card-face card-front">
          <span class="card-cat-badge ${w.cat}">${getCatLabel(w.cat)}</span>
          <span class="card-topic-badge">${w.topic}</span>
          <div class="chinese-char">${w.zh}</div>
          <div class="pinyin">${w.py}</div>
          <div class="arabic-meaning">${w.ar}</div>
          <div class="tts-row" onclick="event.stopPropagation()">
            <button class="tts-btn" onclick="speak('${w.zh}')">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
              الكلمة
            </button>
          </div>
          <span class="tap-hint">اضغط للقلب ↻</span>
          <span class="card-number">${currentIndex + 1} / ${filteredWords.length}</span>
        </div>
        <div class="card-face card-back" onclick="event.stopPropagation()">
          <div class="back-section">
            <div class="back-label">الكلمة</div>
            <div class="back-chinese">${w.zh}</div>
            <div class="back-pinyin-line">${w.py}</div>
            <div class="back-arabic">${w.ar} — <span style="color:var(--${w.cat==='verb'?'verb':w.cat==='noun'?'noun':'adj'})">${getCatLabel(w.cat)}</span></div>
          </div>
          <div class="back-section">
            <div class="back-label">جملة تطبيقية</div>
            <div class="sentence-box">
              <div class="sentence-chinese">${w.sentence.zh}</div>
              <div class="sentence-pinyin">${w.sentence.py}</div>
              <div class="sentence-arabic">${w.sentence.ar}</div>
            </div>
            <div class="tts-row">
              <button class="tts-btn" onclick="speak('${w.zh}')">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                الكلمة
              </button>
              <button class="tts-btn" onclick="speak('${w.sentence.zh.replace(/'/g, "\\'")}')">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                الجملة
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function flipCard() {
  const card = document.getElementById('theCard');
  if (card) {
    isFlipped = !isFlipped;
    card.classList.toggle('flipped', isFlipped);
  }
}

// ============================================================
// NAVIGATION
// ============================================================
function goNext() {
  if (filteredWords.length === 0) return;
  currentIndex = (currentIndex + 1) % filteredWords.length;
  isFlipped = false;
  renderCard();
  updateProgress();
}

function goPrev() {
  if (filteredWords.length === 0) return;
  currentIndex = (currentIndex - 1 + filteredWords.length) % filteredWords.length;
  isFlipped = false;
  renderCard();
  updateProgress();
}

function markKnown() {
  if (filteredWords.length === 0) return;
  const w = filteredWords[currentIndex];
  known.add(w.zh);
  unknown.delete(w.zh);
  saveState();
  updateCounts();
  goNext();
}

function markUnknown() {
  if (filteredWords.length === 0) return;
  const w = filteredWords[currentIndex];
  unknown.add(w.zh);
  known.delete(w.zh);
  saveState();
  updateCounts();
  goNext();
}

function shuffleCards() {
  for (let i = filteredWords.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filteredWords[i], filteredWords[j]] = [filteredWords[j], filteredWords[i]];
  }
  currentIndex = 0;
  isFlipped = false;
  renderCard();
  updateProgress();
}

function updateProgress() {
  const total = filteredWords.length;
  const pct = total > 0 ? ((currentIndex + 1) / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${currentIndex + 1} / ${total}`;
}

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    if (e.key === 'ArrowLeft') goNext();
    else goPrev();
  } else if (e.key === ' ') {
    e.preventDefault();
    flipCard();
  } else if (e.key === '1') markKnown();
  else if (e.key === '2') markUnknown();
});

// Touch swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 60) {
    if (diff > 0) goNext();
    else goPrev();
  }
});

// ============================================================
// EVENT LISTENERS
// ============================================================
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => setFilter(btn.dataset.cat));
});

document.getElementById('prevBtn').addEventListener('click', goPrev);
document.getElementById('nextBtn').addEventListener('click', goNext);
document.getElementById('knowBtn').addEventListener('click', markKnown);
document.getElementById('dontKnowBtn').addEventListener('click', markUnknown);
document.getElementById('shuffleBtn').addEventListener('click', shuffleCards);

// ============================================================
// INIT
// ============================================================
buildTopicFilters();
updateCounts();
renderCard();
updateProgress();
</script>
</body>
</html>
