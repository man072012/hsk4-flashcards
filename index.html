<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بطاقات HSK4 التعليمية</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #14141f;
  --surface-2: #1e1e2e;
  --accent: #f59e0b;
  --accent-glow: #f59e0b44;
  --verb: #ef4444;
  --noun: #3b82f6;
  --adj: #10b981;
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --card-front: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  --card-back: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
  --correct: #10b981;
  --wrong: #ef4444;
  --radius: 20px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans Arabic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 30% 20%, #f59e0b08 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, #3b82f608 0%, transparent 50%);
  animation: ambientDrift 20s ease-in-out infinite alternate;
  pointer-events: none; z-index: 0;
}
@keyframes ambientDrift {
  0% { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(-3%, 3%) rotate(2deg); }
}
.header { position: relative; z-index: 10; padding: 24px 20px 12px; text-align: center; }
.header h1 {
  font-size: 1.8rem; font-weight: 800;
  background: linear-gradient(135deg, var(--accent), #fbbf24, #f97316);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 4px; letter-spacing: -0.5px;
}
.header .subtitle { font-size: 0.85rem; color: var(--text-dim); font-weight: 300; }
.mode-switcher { position: relative; z-index: 10; display: flex; justify-content: center; padding: 8px 20px 16px; }
.mode-switcher-inner { display: flex; background: var(--surface); border-radius: 14px; padding: 4px; border: 1px solid #ffffff0a; }
.mode-btn {
  padding: 10px 24px; border: none; border-radius: 11px; background: transparent;
  color: var(--text-dim); font-family: inherit; font-size: 0.85rem; font-weight: 700;
  cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 7px;
}
.mode-btn:hover { color: var(--text); }
.mode-btn.active { background: var(--accent); color: #000; box-shadow: 0 4px 20px var(--accent-glow); }
.mode-btn svg { width: 18px; height: 18px; }
.stats-bar { position: relative; z-index: 10; display: flex; justify-content: center; gap: 12px; padding: 0 20px 12px; flex-wrap: wrap; }
.stat { background: var(--surface); border: 1px solid #ffffff0a; border-radius: 12px; padding: 8px 14px; text-align: center; min-width: 70px; }
.stat-num { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 0.65rem; color: var(--text-dim); margin-top: 2px; }
.filters { position: relative; z-index: 10; display: flex; justify-content: center; gap: 8px; padding: 8px 20px 16px; flex-wrap: wrap; }
.filter-btn {
  background: var(--surface); border: 1px solid #ffffff0a; border-radius: 30px; padding: 8px 18px;
  color: var(--text-dim); font-family: inherit; font-size: 0.8rem; font-weight: 600;
  cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 6px;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
.filter-btn[data-cat="verb"].active { background: var(--verb); }
.filter-btn[data-cat="noun"].active { background: var(--noun); }
.filter-btn[data-cat="adj"].active { background: var(--adj); }
.filter-btn .count { opacity: 0.7; font-weight: 400; }
.category-filters { position: relative; z-index: 10; display: flex; justify-content: center; gap: 6px; padding: 0 20px 12px; flex-wrap: wrap; }
.cat-btn { background: transparent; border: 1.5px solid #ffffff15; border-radius: 20px; padding: 5px 14px; font-family: inherit; font-size: 0.72rem; font-weight: 600; cursor: pointer; transition: all 0.3s; color: var(--text-dim); }
.cat-btn:hover { border-color: var(--accent); color: var(--text); }
.cat-btn.active { background: var(--surface-2); border-color: var(--accent); color: var(--accent); }
.progress-wrap { position: relative; z-index: 10; padding: 0 24px 16px; }
.progress-bar { height: 4px; background: var(--surface-2); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #f97316); border-radius: 4px; transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1); width: 0%; }
.progress-text { text-align: center; font-size: 0.7rem; color: var(--text-dim); margin-top: 6px; }
.card-area { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; padding: 0 20px; min-height: 360px; }
.card-container { perspective: 1200px; width: 100%; max-width: 400px; }
.card { position: relative; width: 100%; min-height: 340px; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; }
.card.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; top: 0; left: 0; width: 100%; min-height: 340px; backface-visibility: hidden; border-radius: var(--radius); padding: 28px 24px; display: flex; flex-direction: column; border: 1px solid #ffffff08; }
.card-front { background: var(--card-front); justify-content: center; align-items: center; text-align: center; }
.card-back { background: var(--card-back); transform: rotateY(180deg); direction: rtl; }
.card-cat-badge { position: absolute; top: 16px; right: 16px; padding: 4px 12px; border-radius: 20px; font-size: 0.65rem; font-weight: 700; }
.card-cat-badge.verb { background: var(--verb); color: #fff; }
.card-cat-badge.noun { background: var(--noun); color: #fff; }
.card-cat-badge.adj { background: var(--adj); color: #fff; }
.card-topic-badge { position: absolute; top: 16px; left: 16px; padding: 4px 10px; border-radius: 20px; font-size: 0.6rem; font-weight: 500; background: #ffffff0a; color: var(--text-dim); border: 1px solid #ffffff08; }
.card-number { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); font-size: 0.7rem; color: var(--text-dim); }
.chinese-char { font-family: 'Ma Shan Zheng', 'Noto Sans SC', sans-serif; font-size: 4.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 40px var(--accent-glow); margin-bottom: 12px; line-height: 1.1; }
.pinyin { font-size: 1.2rem; color: var(--accent); font-weight: 400; margin-bottom: 8px; font-style: italic; }
.arabic-meaning { font-size: 1.1rem; color: var(--text); font-weight: 600; }
.tap-hint { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); font-size: 0.65rem; color: var(--text-dim); opacity: 0.5; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
.back-section { margin-bottom: 16px; }
.back-label { font-size: 0.65rem; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.back-chinese { font-family: 'Noto Sans SC', sans-serif; font-size: 1.6rem; font-weight: 700; color: #fff; direction: ltr; text-align: left; margin-bottom: 2px; }
.back-pinyin-line { font-size: 0.85rem; color: var(--accent); font-style: italic; direction: ltr; text-align: left; margin-bottom: 6px; }
.back-arabic { font-size: 0.95rem; color: var(--text); line-height: 1.5; }
.sentence-box { background: #ffffff06; border: 1px solid #ffffff0a; border-radius: 12px; padding: 14px; }
.sentence-chinese { font-family: 'Noto Sans SC', sans-serif; font-size: 1.1rem; font-weight: 500; color: #fff; direction: ltr; text-align: left; line-height: 1.6; margin-bottom: 4px; }
.sentence-pinyin { font-size: 0.75rem; color: var(--accent); font-style: italic; direction: ltr; text-align: left; margin-bottom: 6px; opacity: 0.8; }
.sentence-arabic { font-size: 0.85rem; color: var(--text-dim); line-height: 1.5; }
.tts-row { display: flex; gap: 8px; margin-top: 10px; direction: ltr; }
.tts-btn { background: var(--accent); border: none; border-radius: 10px; padding: 8px 14px; color: #000; font-family: inherit; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 5px; }
.tts-btn:hover { transform: scale(1.05); }
.tts-btn:active { transform: scale(0.95); }
.tts-btn svg { width: 14px; height: 14px; }
.nav-area { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; gap: 20px; padding: 20px; }
.nav-btn { width: 52px; height: 52px; border-radius: 50%; background: var(--surface); border: 1px solid #ffffff0a; color: var(--text); font-size: 1.3rem; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; }
.nav-btn:hover { background: var(--surface-2); border-color: var(--accent); }
.know-btn, .dont-know-btn { padding: 12px 24px; border-radius: 14px; border: none; font-family: inherit; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.know-btn { background: var(--adj); color: #fff; }
.dont-know-btn { background: var(--verb); color: #fff; }
.know-btn:hover, .dont-know-btn:hover { transform: scale(1.05); }
.shuffle-btn { position: relative; z-index: 10; display: block; margin: 0 auto 24px; background: transparent; border: 1px solid #ffffff15; border-radius: 30px; padding: 8px 20px; color: var(--text-dim); font-family: inherit; font-size: 0.75rem; cursor: pointer; transition: all 0.3s; }
.shuffle-btn:hover { border-color: var(--accent); color: var(--accent); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
.card-enter { animation: cardEnter 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
@keyframes cardEnter { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

/* QUIZ STYLES */
.quiz-card { width: 100%; max-width: 400px; background: var(--card-front); border-radius: var(--radius); border: 1px solid #ffffff08; padding: 32px 24px; text-align: center; }
.quiz-card.card-enter { animation: cardEnter 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
.quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.quiz-score-badge { padding: 6px 14px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; background: var(--surface-2); border: 1px solid #ffffff0a; color: var(--text-dim); direction: ltr; }
.quiz-score-badge .correct-num { color: var(--correct); }
.quiz-score-badge .wrong-num { color: var(--wrong); }
.quiz-chinese { font-family: 'Ma Shan Zheng', 'Noto Sans SC', sans-serif; font-size: 5rem; font-weight: 900; color: #fff; text-shadow: 0 0 50px var(--accent-glow); margin: 16px 0; line-height: 1.1; }
.quiz-arabic-hint { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 24px; font-weight: 500; }
.quiz-input-wrap { position: relative; margin: 0 auto 16px; max-width: 300px; direction: ltr; }
.quiz-input { width: 100%; padding: 14px 20px; border-radius: 14px; border: 2px solid #ffffff15; background: var(--surface-2); color: var(--text); font-family: inherit; font-size: 1.2rem; text-align: center; outline: none; transition: all 0.3s; letter-spacing: 1px; }
.quiz-input::placeholder { color: var(--text-dim); font-size: 0.85rem; letter-spacing: 0; }
.quiz-input:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
.quiz-input.correct { border-color: var(--correct); box-shadow: 0 0 20px #10b98144; background: #10b98110; }
.quiz-input.wrong { border-color: var(--wrong); box-shadow: 0 0 20px #ef444444; background: #ef444410; }
.quiz-submit-btn { padding: 12px 40px; border-radius: 14px; border: none; background: var(--accent); color: #000; font-family: inherit; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-bottom: 8px; }
.quiz-submit-btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px var(--accent-glow); }
.quiz-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.quiz-skip-btn { display: block; margin: 8px auto 0; padding: 8px 20px; border-radius: 10px; border: 1px solid #ffffff15; background: transparent; color: var(--text-dim); font-family: inherit; font-size: 0.75rem; cursor: pointer; transition: all 0.3s; }
.quiz-skip-btn:hover { border-color: var(--accent); color: var(--accent); }
.quiz-feedback { margin-top: 16px; padding: 16px; border-radius: 14px; animation: feedbackIn 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
@keyframes feedbackIn { from { opacity: 0; transform: translateY(10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
.quiz-feedback.correct-fb { background: #10b98115; border: 1px solid #10b98130; }
.quiz-feedback.wrong-fb { background: #ef444415; border: 1px solid #ef444430; }
.quiz-fb-icon { font-size: 2rem; margin-bottom: 8px; }
.quiz-fb-text { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
.quiz-fb-answer { font-size: 1.1rem; font-weight: 700; direction: ltr; margin-top: 4px; }
.quiz-fb-answer .correct-answer { color: var(--correct); }
.quiz-next-btn { margin-top: 14px; padding: 10px 30px; border-radius: 12px; border: 1px solid #ffffff0a; background: var(--surface-2); color: var(--text); font-family: inherit; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.quiz-next-btn:hover { border-color: var(--accent); }
.quiz-summary { width: 100%; max-width: 400px; text-align: center; padding: 40px 24px; animation: feedbackIn 0.5s ease; }
.quiz-summary-title { font-size: 1.4rem; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
.quiz-summary-emoji { font-size: 4rem; margin: 16px 0; }
.quiz-score-display { font-size: 3.5rem; font-weight: 900; margin: 12px 0 4px; }
.quiz-score-label { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 20px; }
.quiz-summary-details { display: flex; justify-content: center; gap: 24px; margin-bottom: 24px; }
.quiz-detail { text-align: center; }
.quiz-detail-num { font-size: 1.8rem; font-weight: 800; }
.quiz-detail-label { font-size: 0.7rem; color: var(--text-dim); }
.quiz-mistakes-list { text-align: right; margin-top: 20px; background: var(--surface); border-radius: 14px; padding: 16px; border: 1px solid #ffffff08; max-height: 250px; overflow-y: auto; }
.quiz-mistakes-title { font-size: 0.75rem; color: var(--wrong); font-weight: 700; margin-bottom: 10px; text-align: center; }
.quiz-mistake-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #ffffff06; direction: ltr; }
.quiz-mistake-item:last-child { border-bottom: none; }
.mistake-zh { font-family: 'Noto Sans SC', sans-serif; font-size: 1.1rem; font-weight: 700; color: #fff; }
.mistake-correct { font-size: 0.85rem; color: var(--correct); font-weight: 600; }
.mistake-yours { font-size: 0.8rem; color: var(--wrong); text-decoration: line-through; opacity: 0.7; }
.quiz-restart-btn { margin-top: 20px; padding: 14px 40px; border-radius: 14px; border: none; background: var(--accent); color: #000; font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.quiz-restart-btn:hover { transform: scale(1.05); }
@keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-6px); } 80% { transform: translateX(6px); } }
.shake { animation: shake 0.4s ease; }
.hidden { display: none !important; }
@media (max-width: 420px) { .chinese-char, .quiz-chinese { font-size: 3.5rem; } .card-face { padding: 24px 18px; min-height: 310px; } .card { min-height: 310px; } .quiz-card { padding: 24px 18px; } }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 4px; }
</style>
</head>
<body>
<div class="header">
  <h1>بطاقات HSK4 التعليمية</h1>
  <div class="subtitle">أفعال · أسماء · صفات — مع النطق والجمل والاختبار</div>
</div>
<div class="mode-switcher">
  <div class="mode-switcher-inner">
    <button class="mode-btn active" id="modeCards" onclick="setMode('cards')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="3"/><line x1="2" y1="9" x2="22" y2="9"/></svg>
      بطاقات
    </button>
    <button class="mode-btn" id="modeQuiz" onclick="setMode('quiz')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5"/></svg>
      اختبار كتابة 汉字
    </button>
  </div>
</div>
<div class="stats-bar" id="statsBar">
  <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">إجمالي</div></div>
  <div class="stat"><div class="stat-num" id="knownCount" style="color:var(--adj)">0</div><div class="stat-label">أعرفها</div></div>
  <div class="stat"><div class="stat-num" id="unknownCount" style="color:var(--verb)">0</div><div class="stat-label">أراجعها</div></div>
</div>
<div class="stats-bar hidden" id="quizStatsBar">
  <div class="stat"><div class="stat-num" id="quizTotal">0</div><div class="stat-label">أسئلة</div></div>
  <div class="stat"><div class="stat-num" id="quizCorrectStat" style="color:var(--correct)">0</div><div class="stat-label">صحيح</div></div>
  <div class="stat"><div class="stat-num" id="quizWrongStat" style="color:var(--wrong)">0</div><div class="stat-label">خطأ</div></div>
</div>
<div class="filters">
  <button class="filter-btn active" data-cat="all">الكل <span class="count" id="countAll"></span></button>
  <button class="filter-btn" data-cat="verb">أفعال <span class="count" id="countVerb"></span></button>
  <button class="filter-btn" data-cat="noun">أسماء <span class="count" id="countNoun"></span></button>
  <button class="filter-btn" data-cat="adj">صفات <span class="count" id="countAdj"></span></button>
</div>
<div class="category-filters" id="topicFilters"></div>
<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">0 / 0</div>
</div>
<div class="card-area" id="cardArea"></div>
<div class="nav-area" id="navArea">
  <button class="dont-know-btn" id="dontKnowBtn">✗ لا أعرف</button>
  <button class="nav-btn" id="prevBtn">→</button>
  <button class="nav-btn" id="nextBtn">←</button>
  <button class="know-btn" id="knowBtn">✓ أعرف</button>
</div>
<button class="shuffle-btn" id="shuffleBtn">🔀 خلط البطاقات</button>
<script>
const words = [
  {zh:"尝",py:"cháng",ar:"يُجرّب / يتذوّق",cat:"verb",topic:"التصرفات",sentence:{zh:"你尝一下这个菜，味道很好。",py:"Nǐ cháng yíxià zhège cài, wèidào hěn hǎo.",ar:"جرّب هذا الطبق، طعمه لذيذ جداً."}},
  {zh:"讨论",py:"tǎolùn",ar:"يُناقش",cat:"verb",topic:"التصرفات",sentence:{zh:"我们一起讨论这个问题吧。",py:"Wǒmen yìqǐ tǎolùn zhège wèntí ba.",ar:"لنناقش هذه المشكلة معاً."}},
  {zh:"商量",py:"shāngliáng",ar:"يتشاور",cat:"verb",topic:"التصرفات",sentence:{zh:"这件事我们商量一下再决定。",py:"Zhè jiàn shì wǒmen shāngliáng yíxià zài juédìng.",ar:"لنتشاور حول هذا الأمر قبل أن نقرر."}},
  {zh:"猜",py:"cāi",ar:"يُخمّن",cat:"verb",topic:"التصرفات",sentence:{zh:"你猜猜这个东西多少钱？",py:"Nǐ cāi cāi zhège dōngxi duōshao qián?",ar:"خمّن كم سعر هذا الشيء؟"}},
  {zh:"收拾",py:"shōushi",ar:"يُرتّب / يُنظّف",cat:"verb",topic:"التصرفات",sentence:{zh:"请你收拾一下房间。",py:"Qǐng nǐ shōushi yíxià fángjiān.",ar:"رجاءً رتّب الغرفة."}},

let quizWords=[],quizIndex=0,quizCorrect=0,quizWrong=0,quizMistakes=[],quizAnswered=false;
try{const s=localStorage.getItem('hsk4_known');if(s)known=new Set(JSON.parse(s));const u=localStorage.getItem('hsk4_unknown');if(u)unknown=new Set(JSON.parse(u));}catch(e){}
function saveState(){try{localStorage.setItem('hsk4_known',JSON.stringify([...known]));localStorage.setItem('hsk4_unknown',JSON.stringify([...unknown]));}catch(e){}}
function speak(text,lang='zh-CN'){if('speechSynthesis' in window){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=lang;u.rate=0.85;u.pitch=1;const voices=window.speechSynthesis.getVoices();const p=voices.find(v=>v.lang.startsWith('zh')&&(v.name.includes('Microsoft')||v.name.includes('Huihui')||v.name.includes('Xiaoxiao')||v.name.includes('Google')))||voices.find(v=>v.lang.startsWith('zh'));if(p)u.voice=p;window.speechSynthesis.speak(u);}}
if('speechSynthesis' in window){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();}

function setMode(mode){currentMode=mode;document.getElementById('modeCards').classList.toggle('active',mode==='cards');document.getElementById('modeQuiz').classList.toggle('active',mode==='quiz');document.getElementById('statsBar').classList.toggle('hidden',mode==='quiz');document.getElementById('quizStatsBar').classList.toggle('hidden',mode==='cards');document.getElementById('navArea').classList.toggle('hidden',mode==='quiz');document.getElementById('shuffleBtn').classList.toggle('hidden',mode==='quiz');if(mode==='quiz'){startQuiz();}else{renderCard();updateProgress();}}

function getTopics(){const t=new Set();words.forEach(w=>t.add(w.topic));return[...t];}
function buildTopicFilters(){const c=document.getElementById('topicFilters');const topics=getTopics();let h='<button class="cat-btn active" data-topic="all" onclick="setTopic(\'all\')">كل المواضيع</button>';topics.forEach(t=>{h+='<button class="cat-btn" data-topic="'+t+'" onclick="setTopic(\''+t+'\')">'+t+'</button>';});c.innerHTML=h;}
function setTopic(topic){currentTopic=topic;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));document.querySelector('.cat-btn[data-topic="'+topic+'"]').classList.add('active');applyFilters();}
function applyFilters(){filteredWords=words.filter(w=>{const c=currentFilter==='all'||w.cat===currentFilter;const t=currentTopic==='all'||w.topic===currentTopic;return c&&t;});currentIndex=0;isFlipped=false;updateCounts();if(currentMode==='cards'){renderCard();updateProgress();}else{startQuiz();}}
function setFilter(cat){currentFilter=cat;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));document.querySelector('.filter-btn[data-cat="'+cat+'"]').classList.add('active');applyFilters();}
function updateCounts(){document.getElementById('countAll').textContent='('+words.length+')';document.getElementById('countVerb').textContent='('+words.filter(w=>w.cat==='verb').length+')';document.getElementById('countNoun').textContent='('+words.filter(w=>w.cat==='noun').length+')';document.getElementById('countAdj').textContent='('+words.filter(w=>w.cat==='adj').length+')';document.getElementById('totalCount').textContent=filteredWords.length;document.getElementById('knownCount').textContent=known.size;document.getElementById('unknownCount').textContent=unknown.size;}
function updateQuizStats(){document.getElementById('quizTotal').textContent=quizWords.length;document.getElementById('quizCorrectStat').textContent=quizCorrect;document.getElementById('quizWrongStat').textContent=quizWrong;}
function normalizePinyin(str){const m={'ā':'a','á':'a','ǎ':'a','à':'a','ē':'e','é':'e','ě':'e','è':'e','ī':'i','í':'i','ǐ':'i','ì':'i','ō':'o','ó':'o','ǒ':'o','ò':'o','ū':'u','ú':'u','ǔ':'u','ù':'u','ǖ':'v','ǘ':'v','ǚ':'v','ǜ':'v','ü':'v'};let r=str.toLowerCase().trim();for(const[a,b] of Object.entries(m)){r=r.replace(new RegExp(a,'g'),b);}return r.replace(/[\s'''\-]/g,'');}
function getCatLabel(c){return{verb:'فعل',noun:'اسم',adj:'صفة'}[c]||c;}

function renderCard(){const a=document.getElementById('cardArea');if(filteredWords.length===0){a.innerHTML='<div class="empty-state"><div class="emoji">📭</div><p>لا توجد بطاقات لهذا التصنيف</p></div>';return;}
const w=filteredWords[currentIndex];
const speakerSVG='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>';
a.innerHTML='<div class="card-container"><div class="card card-enter" id="theCard" onclick="flipCard()"><div class="card-face card-front"><span class="card-cat-badge '+w.cat+'">'+getCatLabel(w.cat)+'</span><span class="card-topic-badge">'+w.topic+'</span><div class="chinese-char">'+w.zh+'</div><div class="pinyin">'+w.py+'</div><div class="arabic-meaning">'+w.ar+'</div><div class="tts-row" onclick="event.stopPropagation()"><button class="tts-btn" onclick="speak(\''+w.zh+'\')">'+speakerSVG+' الكلمة</button></div><span class="tap-hint">اضغط للقلب ↻</span><span class="card-number">'+(currentIndex+1)+' / '+filteredWords.length+'</span></div><div class="card-face card-back" onclick="event.stopPropagation()"><div class="back-section"><div class="back-label">الكلمة</div><div class="back-chinese">'+w.zh+'</div><div class="back-pinyin-line">'+w.py+'</div><div class="back-arabic">'+w.ar+' — <span style="color:var(--'+(w.cat==='verb'?'verb':w.cat==='noun'?'noun':'adj')+')">'+getCatLabel(w.cat)+'</span></div></div><div class="back-section"><div class="back-label">جملة تطبيقية</div><div class="sentence-box"><div class="sentence-chinese">'+w.sentence.zh+'</div><div class="sentence-pinyin">'+w.sentence.py+'</div><div class="sentence-arabic">'+w.sentence.ar+'</div></div><div class="tts-row"><button class="tts-btn" onclick="speak(\''+w.zh+'\')">'+speakerSVG+' الكلمة</button><button class="tts-btn" onclick="speak(\''+w.sentence.zh.replace(/'/g,"\\'")+'\')">'+speakerSVG+' الجملة</button></div></div></div></div></div>';}

function flipCard(){const c=document.getElementById('theCard');if(c){isFlipped=!isFlipped;c.classList.toggle('flipped',isFlipped);}}
function goNext(){if(!filteredWords.length)return;currentIndex=(currentIndex+1)%filteredWords.length;isFlipped=false;renderCard();updateProgress();}
function goPrev(){if(!filteredWords.length)return;currentIndex=(currentIndex-1+filteredWords.length)%filteredWords.length;isFlipped=false;renderCard();updateProgress();}
function markKnown(){if(!filteredWords.length)return;known.add(filteredWords[currentIndex].zh);unknown.delete(filteredWords[currentIndex].zh);saveState();updateCounts();goNext();}
function markUnknown(){if(!filteredWords.length)return;unknown.add(filteredWords[currentIndex].zh);known.delete(filteredWords[currentIndex].zh);saveState();updateCounts();goNext();}
function shuffleCards(){for(let i=filteredWords.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[filteredWords[i],filteredWords[j]]=[filteredWords[j],filteredWords[i]];}currentIndex=0;isFlipped=false;renderCard();updateProgress();}
function updateProgress(){const t=filteredWords.length;const p=t>0?((currentIndex+1)/t*100):0;document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressText').textContent=(currentIndex+1)+' / '+t;}

// QUIZ
function startQuiz(){quizWords=filteredWords.filter(w=>known.has(w.zh));for(let i=quizWords.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[quizWords[i],quizWords[j]]=[quizWords[j],quizWords[i]];}quizIndex=0;quizCorrect=0;quizWrong=0;quizMistakes=[];quizAnswered=false;updateQuizStats();renderQuizCard();}

function renderQuizCard(){const a=document.getElementById('cardArea');if(!quizWords.length){a.innerHTML='<div class="empty-state"><div class="emoji">📝</div><p>لا توجد كلمات محددة بـ "أعرفها" بعد!<br>ارجع لوضع البطاقات واضغط "✓ أعرف" على الكلمات اللي تبي تختبر نفسك فيها.</p></div>';return;}
if(quizIndex>=quizWords.length){renderQuizSummary();return;}
const w=quizWords[quizIndex];quizAnswered=false;
const pct=quizWords.length>0?((quizIndex+1)/quizWords.length*100):0;
document.getElementById('progressFill').style.width=pct+'%';
document.getElementById('progressText').textContent=(quizIndex+1)+' / '+quizWords.length;
const speakerSVG='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>';
a.innerHTML='<div class="quiz-card card-enter"><div class="quiz-header"><span class="card-cat-badge '+w.cat+'">'+getCatLabel(w.cat)+'</span><span class="quiz-score-badge"><span class="correct-num">'+quizCorrect+'</span> ✓ | <span class="wrong-num">'+quizWrong+'</span> ✗</span><span class="card-topic-badge">'+w.topic+'</span></div><div class="pinyin" style="font-size:2.2rem;margin:16px 0 8px;direction:ltr">'+w.py+'</div><div class="quiz-arabic-hint" style="font-size:1.1rem;margin-bottom:20px">'+w.ar+'</div><div class="tts-row" style="justify-content:center;margin-bottom:20px"><button class="tts-btn" onclick="speak(\''+w.zh+'\')">'+speakerSVG+' استمع</button></div><div class="quiz-input-wrap"><input type="text" class="quiz-input" id="quizInput" placeholder="اكتب الحرف الصيني هنا..." autocomplete="off" autocapitalize="off" spellcheck="false" dir="ltr" style="font-family:Noto Sans SC,sans-serif;font-size:1.8rem" /></div><button class="quiz-submit-btn" id="quizSubmitBtn" onclick="checkQuizAnswer()">تحقق ✓</button><button class="quiz-skip-btn" onclick="skipQuizQuestion()">تخطّي ←</button><div id="quizFeedback"></div></div>';
setTimeout(()=>{const inp=document.getElementById('quizInput');if(inp){inp.focus();inp.addEventListener('keydown',(e)=>{if(e.key==='Enter'){if(quizAnswered)quizNext();else checkQuizAnswer();}});}},100);}

function checkQuizAnswer(){if(quizAnswered)return;const inp=document.getElementById('quizInput');const btn=document.getElementById('quizSubmitBtn');const fb=document.getElementById('quizFeedback');if(!inp)return;const ua=inp.value.trim();if(!ua){inp.classList.add('shake');setTimeout(()=>inp.classList.remove('shake'),400);return;}
const w=quizWords[quizIndex];const ok=ua===w.zh;quizAnswered=true;inp.disabled=true;btn.disabled=true;
const speakerSVG='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>';
if(ok){quizCorrect++;inp.classList.add('correct');speak(w.zh);fb.innerHTML='<div class="quiz-feedback correct-fb"><div class="quiz-fb-icon">🎉</div><div class="quiz-fb-text" style="color:var(--correct)">إجابة صحيحة!</div><div class="quiz-fb-answer"><span class="correct-answer" style="font-family:Noto Sans SC,sans-serif;font-size:1.5rem">'+w.zh+'</span> <span style="color:var(--accent)">'+w.py+'</span></div><button class="quiz-next-btn" onclick="quizNext()">التالي →</button></div>';}
else{quizWrong++;quizMistakes.push({word:w,userAnswer:ua});inp.classList.add('wrong','shake');fb.innerHTML='<div class="quiz-feedback wrong-fb"><div class="quiz-fb-icon">😅</div><div class="quiz-fb-text" style="color:var(--wrong)">ليس تماماً...</div><div class="quiz-fb-answer">الصحيح: <span class="correct-answer" style="font-family:Noto Sans SC,sans-serif;font-size:1.5rem">'+w.zh+'</span><br>إجابتك: <span style="color:var(--wrong);text-decoration:line-through;font-family:Noto Sans SC,sans-serif;font-size:1.3rem">'+ua+'</span></div><div class="tts-row" style="justify-content:center;margin-top:10px"><button class="tts-btn" onclick="speak(\''+w.zh+'\')">'+speakerSVG+' استمع</button></div><button class="quiz-next-btn" onclick="quizNext()">التالي →</button></div>';}
updateQuizStats();}

function skipQuizQuestion(){if(quizAnswered)return;const w=quizWords[quizIndex];quizWrong++;quizMistakes.push({word:w,userAnswer:'(تخطّي)'});quizAnswered=true;updateQuizStats();
const fb=document.getElementById('quizFeedback');const inp=document.getElementById('quizInput');const btn=document.getElementById('quizSubmitBtn');
if(inp){inp.disabled=true;inp.classList.add('wrong');}if(btn)btn.disabled=true;
const speakerSVG='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>';
fb.innerHTML='<div class="quiz-feedback wrong-fb"><div class="quiz-fb-icon">📖</div><div class="quiz-fb-text" style="color:var(--accent)">الإجابة الصحيحة:</div><div class="quiz-fb-answer"><span class="correct-answer" style="font-family:Noto Sans SC,sans-serif;font-size:1.5rem">'+w.zh+'</span> <span style="color:var(--accent)">'+w.py+'</span></div><div class="tts-row" style="justify-content:center;margin-top:10px"><button class="tts-btn" onclick="speak(\''+w.zh+'\')">'+speakerSVG+' استمع</button></div><button class="quiz-next-btn" onclick="quizNext()">التالي →</button></div>';}

function quizNext(){quizIndex++;renderQuizCard();}

function renderQuizSummary(){const a=document.getElementById('cardArea');const t=quizWords.length;const pct=t>0?Math.round((quizCorrect/t)*100):0;
let emoji='🎉',msg='ممتاز! أداء رائع!';
if(pct<30){emoji='💪';msg='استمر في التدريب!';}else if(pct<60){emoji='📚';msg='جيد، واصل المراجعة!';}else if(pct<80){emoji='👏';msg='أحسنت! قريب من الإتقان!';}else if(pct<100){emoji='🌟';msg='رائع جداً!';}
document.getElementById('progressFill').style.width='100%';document.getElementById('progressText').textContent=t+' / '+t;
let mHTML='';if(quizMistakes.length>0){mHTML='<div class="quiz-mistakes-list"><div class="quiz-mistakes-title">الكلمات التي تحتاج مراجعة ('+quizMistakes.length+')</div>';quizMistakes.forEach(m=>{mHTML+='<div class="quiz-mistake-item"><span class="mistake-correct" style="font-size:0.75rem">'+m.word.py+'</span><span class="mistake-zh">'+m.word.zh+'</span><span class="mistake-yours" style="font-family:Noto Sans SC,sans-serif">'+m.userAnswer+'</span></div>';});mHTML+='</div>';}
a.innerHTML='<div class="quiz-summary"><div class="quiz-summary-title">نتيجة الاختبار</div><div class="quiz-summary-emoji">'+emoji+'</div><div class="quiz-score-display" style="color:'+(pct>=60?'var(--correct)':'var(--wrong)')+'">%'+pct+'</div><div class="quiz-score-label">'+msg+'</div><div class="quiz-summary-details"><div class="quiz-detail"><div class="quiz-detail-num" style="color:var(--correct)">'+quizCorrect+'</div><div class="quiz-detail-label">صحيح</div></div><div class="quiz-detail"><div class="quiz-detail-num" style="color:var(--wrong)">'+quizWrong+'</div><div class="quiz-detail-label">خطأ</div></div><div class="quiz-detail"><div class="quiz-detail-num" style="color:var(--accent)">'+t+'</div><div class="quiz-detail-label">إجمالي</div></div></div>'+mHTML+'<button class="quiz-restart-btn" onclick="startQuiz()">🔄 إعادة الاختبار</button></div>';}

// Keyboard & Touch
document.addEventListener('keydown',e=>{if(currentMode==='quiz')return;if(e.key==='ArrowLeft')goNext();else if(e.key==='ArrowRight')goPrev();else if(e.key===' '){e.preventDefault();flipCard();}else if(e.key==='1')markKnown();else if(e.key==='2')markUnknown();});
let touchStartX=0;document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;});document.addEventListener('touchend',e=>{if(currentMode==='quiz')return;const d=touchStartX-e.changedTouches[0].clientX;if(Math.abs(d)>60){if(d>0)goNext();else goPrev();}});

// Event Listeners
document.querySelectorAll('.filter-btn').forEach(b=>{b.addEventListener('click',()=>setFilter(b.dataset.cat));});
document.getElementById('prevBtn').addEventListener('click',goPrev);
document.getElementById('nextBtn').addEventListener('click',goNext);
document.getElementById('knowBtn').addEventListener('click',markKnown);
document.getElementById('dontKnowBtn').addEventListener('click',markUnknown);
document.getElementById('shuffleBtn').addEventListener('click',shuffleCards);

// Init
buildTopicFilters();updateCounts();renderCard();updateProgress();
</script>
</body>
</html>
